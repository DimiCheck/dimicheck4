<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#fff7e8" />
  <meta name="application-name" content="DIMI Check" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <script>
    (function () {
      try {
        const raw = localStorage.getItem('dimicheck:settings');
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed.theme === 'light' || parsed.theme === 'dark') {
          document.documentElement.dataset.theme = parsed.theme;
        }
      } catch (_) {}
    })();
  </script>
  <script defer src="/js/pwa.js"></script>
  <script defer src="/js/auth-guard.js"></script>
  <script defer src="/js/preferences.js"></script>
  <script defer src="/js/events.js"></script>
  <title>이벤트 - DIMI Check</title>
  <style>
    :root {
      --bg: #fff8ed;
      --card: rgba(255, 255, 255, 0.86);
      --ink: #241a12;
      --muted: #7b6758;
      --line: rgba(82, 58, 36, 0.12);
      --accent: #e8894d;
      --coin: #c47b13;
      --shadow: 0 20px 48px rgba(129, 84, 40, 0.14);
    }

    :root[data-theme='dark'] {
      --bg: #141922;
      --card: rgba(28, 35, 45, 0.9);
      --ink: #f6f1e9;
      --muted: #b9aa9d;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #f0a46c;
      --coin: #ffd15a;
      --shadow: 0 20px 48px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Pretendard", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 213, 120, 0.44), transparent 28%),
        radial-gradient(circle at 86% 16%, rgba(255, 139, 96, 0.28), transparent 30%),
        linear-gradient(180deg, var(--bg), color-mix(in oklab, var(--bg) 82%, #f0c181 18%));
      padding: 22px 16px calc(96px + env(safe-area-inset-bottom));
    }

    main {
      width: min(920px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .hero,
    .event-card,
    .empty-state {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 9vw, 60px);
      letter-spacing: -0.07em;
      line-height: 0.96;
    }

    .hero-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-weight: 650;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .status-pill {
      border-radius: 20px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.48);
      border: 1px solid var(--line);
    }

    .status-pill span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-pill strong {
      display: block;
      margin-top: 5px;
      font-size: 22px;
      color: var(--coin);
    }

    .event-list {
      display: grid;
      gap: 14px;
    }

    .event-card {
      padding: 20px;
      display: grid;
      gap: 14px;
      overflow: hidden;
      position: relative;
    }

    .event-card::after {
      content: '';
      position: absolute;
      right: -48px;
      top: -54px;
      width: 150px;
      height: 150px;
      border-radius: 999px;
      background: conic-gradient(from 20deg, rgba(255, 209, 90, 0.9), rgba(90, 215, 192, 0.55), rgba(255, 122, 79, 0.72), rgba(255, 209, 90, 0.9));
      opacity: 0.18;
      pointer-events: none;
    }

    .event-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .event-title {
      margin: 0;
      font-size: 21px;
      letter-spacing: -0.04em;
    }

    .reward {
      white-space: nowrap;
      color: var(--coin);
      font-weight: 950;
      border-radius: 999px;
      padding: 8px 12px;
      background: color-mix(in oklab, var(--coin) 13%, transparent);
    }

    .question {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 18px;
      font-weight: 850;
      line-height: 1.45;
    }

    .desc,
    .hint,
    .meta {
      position: relative;
      z-index: 1;
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .hint {
      border-radius: 16px;
      padding: 12px;
      background: color-mix(in oklab, var(--accent) 10%, transparent);
    }

    .answer-row {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .answer-input {
      flex: 1 1 220px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: color-mix(in oklab, var(--card) 82%, #fff 18%);
      color: var(--ink);
      padding: 13px 14px;
      font: inherit;
      font-weight: 750;
      outline: none;
    }

    .claim-btn {
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), #f4c37d);
      color: #fffaf4;
      padding: 0 18px;
      min-height: 48px;
      font: inherit;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(232, 137, 77, 0.24);
    }

    .claim-btn:disabled {
      cursor: default;
      opacity: 0.5;
      box-shadow: none;
    }

    .empty-state {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(22px + env(safe-area-inset-bottom));
      z-index: 1000;
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      color: #fff;
      background: rgba(24, 20, 16, 0.92);
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 850;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.24);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 680px) {
      .status-row { grid-template-columns: 1fr; }
      .event-top { flex-direction: column; }
      .claim-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <a class="back-link" href="/my.html">← 마이 페이지</a>
      <div>
        <h1>이벤트</h1>
        <p class="hero-copy">선생님이 올린 짧은 퀴즈를 맞히고 코인을 받아요. 퀴즈 보상은 하루 최대 3개까지만 받을 수 있습니다.</p>
      </div>
      <div class="status-row" aria-live="polite">
        <div class="status-pill">
          <span>Wallet</span>
          <strong id="walletCoins">0</strong>
        </div>
        <div class="status-pill">
          <span>오늘 수령</span>
          <strong id="dailyClaimed">0/3</strong>
        </div>
        <div class="status-pill">
          <span>남은 횟수</span>
          <strong id="dailyRemaining">3</strong>
        </div>
      </div>
    </section>
    <section id="eventList" class="event-list" aria-live="polite"></section>
  </main>
  <div class="toast" id="eventToast" role="status" aria-live="polite"></div>
</body>
</html>
