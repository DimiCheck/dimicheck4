<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#fff7e8" />
  <meta name="application-name" content="DIMI Check" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <script>
    (function () {
      try {
        const raw = localStorage.getItem('dimicheck:settings');
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed.theme === 'light' || parsed.theme === 'dark') {
          document.documentElement.dataset.theme = parsed.theme;
        }
      } catch (_) {}
    })();
  </script>
  <script defer src="/js/pwa.js"></script>
  <script defer src="/js/auth-guard.js"></script>
  <script defer src="/js/preferences.js"></script>
  <script defer src="/js/events.js"></script>
  <title>이벤트 - DIMI Check</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f3ea;
      --bg-2: #f0e5d0;
      --card: rgba(255, 252, 246, 0.88);
      --card-strong: rgba(255, 255, 255, 0.96);
      --ink: #201a12;
      --muted: #766b5d;
      --line: rgba(70, 52, 31, 0.12);
      --accent: #2f6f73;
      --accent-2: #f36d3d;
      --coin: #d99512;
      --shadow: 0 22px 60px rgba(71, 49, 24, 0.16);
    }

    :root[data-theme='dark'] {
      --bg: #111820;
      --bg-2: #1d2833;
      --card: rgba(29, 39, 49, 0.82);
      --card-strong: rgba(36, 48, 60, 0.96);
      --ink: #f5f0e8;
      --muted: #b6aa9a;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #72d5c9;
      --accent-2: #ff8f66;
      --coin: #ffd15a;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Pretendard", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        radial-gradient(circle at 12% 10%, rgba(255, 213, 120, 0.44), transparent 28%),
        radial-gradient(circle at 88% 4%, rgba(77, 178, 171, 0.36), transparent 30%),
        linear-gradient(145deg, var(--bg), var(--bg-2));
      background-size: 34px 34px, 34px 34px, auto, auto, auto;
      padding: 24px 18px calc(96px + env(safe-area-inset-bottom));
    }

    main {
      width: min(920px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .hero,
    .event-card,
    .empty-state {
      border: 1px solid var(--line);
      border-radius: 34px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 28px;
      display: grid;
      gap: 18px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.28)),
        var(--card);
    }

    .hero::after {
      content: '';
      position: absolute;
      right: -90px;
      top: -110px;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      background: conic-gradient(from 120deg, rgba(255, 208, 79, 0.7), rgba(65, 179, 171, 0.64), rgba(247, 107, 65, 0.68), rgba(255, 208, 79, 0.7));
      opacity: 0.72;
      animation: spinOrb 12s linear infinite;
      pointer-events: none;
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 9vw, 60px);
      letter-spacing: -0.07em;
      line-height: 0.96;
    }

    .hero-copy {
      margin: 0;
      max-width: 620px;
      color: var(--muted);
      line-height: 1.55;
      font-weight: 650;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .status-pill {
      border-radius: 20px;
      padding: 14px;
      background: var(--card-strong);
      border: 1px solid var(--line);
      box-shadow: 0 14px 34px rgba(61, 42, 21, 0.09);
    }

    .status-pill span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-pill strong {
      display: block;
      margin-top: 5px;
      font-size: 22px;
      color: var(--coin);
    }

    .event-list {
      display: grid;
      gap: 14px;
    }

    .event-card {
      padding: 20px;
      display: grid;
      gap: 14px;
      overflow: hidden;
      position: relative;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .event-card:hover {
      transform: translateY(-4px);
      border-color: color-mix(in oklab, var(--accent) 34%, var(--line));
      box-shadow: 0 22px 56px rgba(71, 49, 24, 0.17);
    }

    .event-card::after {
      content: '';
      position: absolute;
      right: -48px;
      top: -54px;
      width: 150px;
      height: 150px;
      border-radius: 999px;
      background: conic-gradient(from 20deg, rgba(255, 209, 90, 0.92), rgba(47, 111, 115, 0.58), rgba(243, 109, 61, 0.72), rgba(255, 209, 90, 0.92));
      opacity: 0.22;
      pointer-events: none;
    }

    .event-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .event-title {
      margin: 0;
      font-size: 21px;
      letter-spacing: -0.04em;
    }

    .reward {
      white-space: nowrap;
      color: var(--coin);
      font-weight: 950;
      border-radius: 999px;
      padding: 8px 12px;
      background: color-mix(in oklab, var(--coin) 13%, transparent);
    }

    .question {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 18px;
      font-weight: 850;
      line-height: 1.45;
    }

    .desc,
    .hint,
    .meta {
      position: relative;
      z-index: 1;
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .hint {
      border-radius: 16px;
      padding: 12px;
      background: color-mix(in oklab, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in oklab, var(--accent) 18%, transparent);
    }

    .answer-row {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .answer-input {
      flex: 1 1 220px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: color-mix(in oklab, var(--card) 82%, #fff 18%);
      color: var(--ink);
      padding: 13px 14px;
      font: inherit;
      font-weight: 750;
      outline: none;
    }

    .claim-btn {
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), #193f44);
      color: #fffaf4;
      padding: 0 18px;
      min-height: 48px;
      font: inherit;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(232, 137, 77, 0.24);
    }

    .claim-btn:disabled {
      cursor: default;
      opacity: 0.5;
      box-shadow: none;
    }

    .empty-state {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(22px + env(safe-area-inset-bottom));
      z-index: 1000;
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      color: #fff;
      background: rgba(24, 20, 16, 0.92);
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 850;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.24);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .bottom-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      height: 68px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 900;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 18px 42px rgba(24, 20, 16, 0.16);
      backdrop-filter: blur(18px) saturate(140%);
    }

    :root[data-theme='dark'] .bottom-nav {
      background: rgba(22, 30, 39, 0.86);
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 800;
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
    }

    .nav-item.active { color: var(--accent); }

    @keyframes spinOrb {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 680px) {
      .status-row { grid-template-columns: 1fr; }
      .event-top { flex-direction: column; }
      .claim-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <a class="back-link" href="/my.html">← 마이 페이지</a>
      <div>
        <h1>이벤트</h1>
        <p class="hero-copy">선생님이 올린 짧은 퀴즈를 맞히고 코인을 받아요. 퀴즈 보상은 하루 최대 3개까지만 받을 수 있습니다.</p>
      </div>
      <div class="status-row" aria-live="polite">
        <div class="status-pill">
          <span>Wallet</span>
          <strong id="walletCoins">0</strong>
        </div>
        <div class="status-pill">
          <span>오늘 수령</span>
          <strong id="dailyClaimed">0/3</strong>
        </div>
        <div class="status-pill">
          <span>남은 횟수</span>
          <strong id="dailyRemaining">3</strong>
        </div>
      </div>
    </section>
    <section id="eventList" class="event-list" aria-live="polite"></section>
  </main>

  <nav class="bottom-nav" aria-label="하단 내비게이션">
    <a href="/schoollife.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 1 9l4 2.18v6.32L12 21l7-3.5V11.18L23 9 12 3zm0 2.69L17.53 9 12 11.31 6.47 9 12 5.69zM18 17.18l-5 2.5v-5.81l5-2.5v5.81z"/></svg>
      <span>학교생활</span>
    </a>
    <a href="/routine.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2a1 1 0 0 1 1 1v1h8V3a1 1 0 1 1 2 0v1h1a3 3 0 0 1 3 3v11a3 3 0 0 1-3 3H4a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h1V3a1 1 0 0 1 1-1Zm13 8H4v9a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-9ZM6 7h12V6H6v1Z"/></svg>
      <span>루틴</span>
    </a>
    <a href="/user.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/></svg>
      <span>홈</span>
    </a>
    <a href="/chat.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
      <span>채팅</span>
    </a>
    <a href="/my.html" class="nav-item active" aria-current="page">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/></svg>
      <span>마이</span>
    </a>
  </nav>
  <div class="toast" id="eventToast" role="status" aria-live="polite"></div>
</body>
</html>
