<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0f14" />
  <meta name="application-name" content="DIMI Check" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.webmanifest">
  <script>
    (function () {
      try {
        const raw = localStorage.getItem('dimicheck:settings');
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed.theme === 'light' || parsed.theme === 'dark') {
          document.documentElement.dataset.theme = parsed.theme;
        } else {
          delete document.documentElement.dataset.theme;
        }
      } catch (err) {
        console.warn('[Theme] preload failed', err);
      }
    })();
  </script>
  <script defer src="/js/pwa.js"></script>
  <script defer src="/js/preferences.js"></script>
  <script defer src="/js/auth-guard.js"></script>
  <title>공지 - DIMI Check</title>
  <meta name="color-scheme" content="light dark" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <link rel="apple-touch-icon" sizes="180x180" href="src/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="src/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="src/favicon/favicon-16x16.png">

  <style>
    :root {
      --bg: #0f1319;
      --bg-2: #151a22;
      --card: rgba(20, 25, 33, .94);
      --card-2: rgba(24, 30, 40, .96);
      --card-alt: rgba(28, 35, 46, .92);
      --text: #f3f6fb;
      --muted: #c0cad8;
      --primary: #d04fff;
      --primary-2: #ff6ad0;
      --shadow: 0 8px 20px rgba(0, 0, 0, .22);
      --radius: 20px;
      --safe-bottom: 0px;
      --border: rgba(255, 255, 255, .12);
      --header-bg: rgba(15, 19, 25, .88);
      --nav-bg: rgba(17, 22, 30, .94);
      --hero-badge-bg: color-mix(in oklab, var(--primary) 18%, transparent);
      --hero-badge-text: #f5e5ff;
      --button-text: #fff9ff;
    }

    :root[data-theme="light"] {
      --bg: #f6f8fb;
      --bg-2: #eef2f8;
      --card: rgba(255, 255, 255, .96);
      --card-2: rgba(250, 252, 255, .98);
      --card-alt: rgba(244, 247, 252, .96);
      --text: #0f172a;
      --muted: #5b6475;
      --primary: #d04fff;
      --primary-2: #ff6ad0;
      --shadow: 0 10px 24px rgba(57, 72, 103, .10);
      --border: rgba(15, 23, 42, .10);
      --header-bg: rgba(246, 248, 251, .92);
      --nav-bg: rgba(255, 255, 255, .95);
      --hero-badge-bg: color-mix(in oklab, var(--primary) 14%, transparent);
      --hero-badge-text: #7b2a9d;
      --button-text: #fff9ff;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #f6f8fb;
        --bg-2: #eef2f8;
        --card: rgba(255, 255, 255, .96);
        --card-2: rgba(250, 252, 255, .98);
        --card-alt: rgba(244, 247, 252, .96);
        --text: #0f172a;
        --muted: #5b6475;
        --primary: #d04fff;
        --primary-2: #ff6ad0;
        --shadow: 0 10px 24px rgba(57, 72, 103, .10);
        --border: rgba(15, 23, 42, .10);
        --header-bg: rgba(246, 248, 251, .92);
        --nav-bg: rgba(255, 255, 255, .95);
        --hero-badge-bg: color-mix(in oklab, var(--primary) 14%, transparent);
        --hero-badge-text: #7b2a9d;
        --button-text: #fff9ff;
      }
    }

    @media (max-width: 1024px), (hover: none) and (pointer: coarse) {
      :root {
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Pretendard", system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .blob-container {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: -1;
      background:
        radial-gradient(900px 600px at 12% -8%, rgba(90, 108, 255, .12), transparent 62%),
        radial-gradient(1000px 700px at 110% 12%, rgba(255, 0, 144, .10), transparent 64%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }

    .blob {
      position: absolute;
      filter: blur(18px);
      opacity: .32;
      pointer-events: none;
    }

    .b1 { width: 48vw; height: 48vw; background: radial-gradient(circle, #ff6a6a50, transparent 70%); top: -10vh; left: -10vw; animation: float 18s ease-in-out infinite; }
    .b2 { width: 42vw; height: 42vw; background: radial-gradient(circle, #038b2545, transparent 70%); bottom: -15vh; right: -10vw; animation: float 22s ease-in-out infinite reverse; }
    .b3 { width: 36vw; height: 36vw; background: radial-gradient(circle, #ff6ae950, transparent 70%); top: 40vh; left: 10vw; animation: float 26s ease-in-out infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 18px clamp(14px, 3vw, 28px);
      background: linear-gradient(180deg, var(--header-bg), transparent);
      border-bottom: 1px solid var(--border);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .title-wrap p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .refresh-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      color: var(--button-text);
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 6px 14px rgba(208, 79, 255, .18);
    }

    main {
      width: min(920px, calc(100vw - 28px));
      margin: 20px auto;
      padding-bottom: calc(96px + var(--safe-bottom));
      display: grid;
      gap: 16px;
    }

    .card {
      border-radius: var(--radius);
      padding: 20px;
      background: linear-gradient(180deg, var(--card), var(--card-2));
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: var(--hero-badge-bg);
      color: var(--hero-badge-text);
      margin-bottom: 12px;
    }

    .hero-title {
      margin: 0 0 10px;
      font-size: 26px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -.02em;
    }

    .hero-meta,
    .notice-meta,
    .state-text {
      color: var(--muted);
      font-size: 14px;
    }

    .notice-list {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .notice-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      background: var(--card-alt);
    }

    .notice-item.unread {
      border-color: color-mix(in oklab, var(--primary) 55%, transparent);
      box-shadow: inset 3px 0 0 color-mix(in oklab, var(--primary) 70%, transparent);
    }

    .notice-text {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .notice-empty {
      padding: 24px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .state-text {
      text-align: center;
      padding: 18px 12px 0;
    }

    .bottom-nav {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(480px, calc(100% - 32px));
      height: 68px;
      padding: 8px 12px calc(8px + var(--safe-bottom));
      display: flex;
      background: var(--nav-bg);
      backdrop-filter: saturate(180%) blur(20px);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      z-index: 1000;
    }

    .nav-item {
      flex: 1;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 4px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 600;
      transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
      transition: transform .25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-item:hover {
      color: var(--text);
      background: rgba(255, 255, 255, .06);
    }

    .nav-item.active {
      color: var(--primary);
      background: color-mix(in oklab, var(--primary) 12%, transparent);
    }

    .nav-item:active svg {
      transform: scale(0.85);
    }

    @media (max-width: 640px) {
      main { width: calc(100vw - 20px); }
      .card { padding: 18px; }
      .hero-title { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="blob-container" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <header>
    <div class="toolbar">
      <div class="title-wrap">
        <h1>공지</h1>
        <p id="noticeMeta">반 공지를 불러오는 중입니다.</p>
      </div>
      <button id="refreshBtn" class="refresh-btn" type="button">새로고침</button>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="hero-badge" id="heroBadge">채팅이 비활성화된 반입니다</div>
      <h2 id="heroTitle" class="hero-title">공지 불러오는 중…</h2>
      <div id="heroMeta" class="hero-meta"></div>
    </section>

    <section class="card">
      <div class="toolbar">
        <div>
          <h3 style="margin:0 0 6px;">전체 공지</h3>
          <div id="noticeState" class="state-text" hidden></div>
        </div>
      </div>
      <div id="noticeList" class="notice-list" aria-live="polite"></div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="하단 내비게이션">
    <a href="/schoollife.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 1 9l4 2.18v6.32L12 21l7-3.5V11.18L23 9 12 3zm0 2.69L17.53 9 12 11.31 6.47 9 12 5.69zM18 17.18l-5 2.5v-5.81l5-2.5v5.81z"/></svg>
      <span>학교생활</span>
    </a>
    <a href="/routine.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2a1 1 0 0 1 1 1v1h8V3a1 1 0 1 1 2 0v1h1a3 3 0 0 1 3 3v11a3 3 0 0 1-3 3H4a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h1V3a1 1 0 0 1 1-1Zm13 8H4v9a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-9ZM6 7h12V6H6v1Z"/></svg>
      <span>루틴</span>
    </a>
    <a href="/user.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>홈</span>
    </a>
    <a href="/chat.html" class="nav-item active" aria-current="page">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
      <span>공지</span>
    </a>
    <a href="/my.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/></svg>
      <span>마이</span>
    </a>
  </nav>

  <script>
    const noticeMeta = document.getElementById('noticeMeta');
    const heroTitle = document.getElementById('heroTitle');
    const heroMeta = document.getElementById('heroMeta');
    const noticeList = document.getElementById('noticeList');
    const noticeState = document.getElementById('noticeState');
    const refreshBtn = document.getElementById('refreshBtn');

    function formatNoticeDatetime(value) {
      if (!value) return '시간 정보 없음';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '시간 정보 없음';
      return date.toLocaleString('ko-KR', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function setState(message, show = true) {
      if (!noticeState) return;
      noticeState.hidden = !show;
      noticeState.textContent = message || '';
    }

    function renderHero(notice, payload) {
      const unreadCount = Number(payload?.unreadCount || 0);
      if (!notice) {
        heroTitle.textContent = '등록된 공지가 없습니다.';
        heroMeta.textContent = '새 공지가 등록되면 이곳에 표시됩니다.';
        return;
      }
      heroTitle.textContent = notice.text || '공지 내용이 없습니다.';
      const parts = [
        notice.teacherName || '선생님',
        formatNoticeDatetime(notice.createdAt),
      ];
      if (unreadCount > 0) {
        parts.push(`읽지 않은 공지 ${unreadCount}개`);
      }
      heroMeta.textContent = parts.join(' · ');
    }

    function renderNoticeList(notices, payload) {
      noticeList.innerHTML = '';
      if (!Array.isArray(notices) || !notices.length) {
        const empty = document.createElement('div');
        empty.className = 'notice-empty';
        empty.textContent = '등록된 공지가 없습니다.';
        noticeList.appendChild(empty);
        return;
      }

      const latestUnreadId = payload?.latestUnread?.id;
      notices.forEach((notice) => {
        const item = document.createElement('article');
        item.className = 'notice-item';
        if (latestUnreadId && notice.id === latestUnreadId) {
          item.classList.add('unread');
        }

        const text = document.createElement('p');
        text.className = 'notice-text';
        text.textContent = notice.text || '';

        const meta = document.createElement('div');
        meta.className = 'notice-meta';
        meta.textContent = `${notice.teacherName || '선생님'} · ${formatNoticeDatetime(notice.createdAt)}`;

        item.appendChild(text);
        item.appendChild(meta);
        noticeList.appendChild(item);
      });
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, {
        credentials: 'include',
        cache: 'no-store',
        ...options,
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        const error = new Error(payload?.error?.message || payload?.error || `HTTP ${response.status}`);
        error.status = response.status;
        throw error;
      }
      return payload;
    }

    async function markNoticesRead(grade, section, hasUnread) {
      if (!hasUnread) return;
      try {
        await fetchJson(`/api/classes/notices/read?grade=${grade}&section=${section}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ all: true }),
        });
      } catch (error) {
        console.warn('[Notice] failed to mark read', error);
      }
    }

    async function loadNotices() {
      try {
        setState('공지 불러오는 중…');
        const auth = await fetchJson('/auth/status');
        const grade = Number(auth?.grade);
        const section = Number(auth?.section || auth?.class);
        if (!Number.isFinite(grade) || !Number.isFinite(section)) {
          throw new Error('학급 정보를 확인할 수 없습니다.');
        }

        noticeMeta.textContent = `${grade}학년 ${section}반 공지`;
        const payload = await fetchJson(`/api/classes/notices?grade=${grade}&section=${section}&mode=all`);
        const notices = Array.isArray(payload?.notices) ? payload.notices : [];
        const heroNotice = payload?.latestUnread || notices[0] || null;

        renderHero(heroNotice, payload);
        renderNoticeList(notices, payload);
        await markNoticesRead(grade, section, Boolean(payload?.hasUnread));
        setState('', false);
      } catch (error) {
        console.error('[Notice] load failed', error);
        heroTitle.textContent = '공지를 불러오지 못했습니다.';
        heroMeta.textContent = '잠시 후 다시 시도해주세요.';
        noticeList.innerHTML = '';
        const empty = document.createElement('div');
        empty.className = 'notice-empty';
        empty.textContent = '공지 정보를 불러오지 못했습니다.';
        noticeList.appendChild(empty);
        setState(error?.message || '공지 로드 실패');
      }
    }

    refreshBtn?.addEventListener('click', () => {
      loadNotices();
    });

    loadNotices();
  </script>
</body>
</html>
