<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->

    function gtag(){dataLayer.push(arguments);}

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <meta name="theme-color" content="#0b0f14"/>
  <meta name="application-name" content="DIMI Check"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="/manifest.webmanifest">
  <script>
    (function(){
      try{
        const raw = localStorage.getItem('dimicheck:settings');
        if(!raw) return;
        const parsed = JSON.parse(raw);
        if(parsed.theme === 'light' || parsed.theme === 'dark'){
          document.documentElement.dataset.theme = parsed.theme;
        }else{
          delete document.documentElement.dataset.theme;
        }
      }catch(error){
        console.warn('[Theme] preload failed', error);
      }
    })();
  </script>
  <script defer src="/js/pwa.js"></script>
  <script defer src="/js/preferences.js"></script>
  <script defer src="/js/notifications.js"></script>
  <title>학교 생활 | Today</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="src/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="src/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="src/favicon/favicon-16x16.png">
  <style>
    :root{
      --bg: #0b0f14;
      --bg-2: #0e1218;
      --card: rgba(255,255,255,.08);
      --card-2: rgba(255,255,255,.06);
      --text: #e9eef6;
      --muted: #a7b0c0;
      --primary: #d04fff;
      --primary-2: #ff6ad0;
      --ring: 0 0 0 8px color-mix(in oklab, var(--primary) 30%, transparent);
      --shadow: 0 10px 30px rgba(0, 0, 0, .45);
      --radius: 20px;
      --ok: #38d67a;
      --warn: #ffb020;
      --err: #ff5c5c;
      --safe-bottom: 0px;
    }
    :root[data-theme="light"]{
      --bg: #f6f8fb;
      --bg-2: #eef2f8;
      --card: rgba(255,255,255,.75);
      --card-2: rgba(255,255,255,.6);
      --text: #0f172a;
      --muted: #5b6475;
      --primary: #d04fff;
      --primary-2: #ff6ad0;
      --shadow: 0 10px 30px rgba(57,72,103,.15);
    }
    :root[data-theme="dark"]{
      --bg: #0b0f14;
      --bg-2: #0e1218;
      --card: rgba(255,255,255,.08);
      --card-2: rgba(255,255,255,.06);
      --text: #e9eef6;
      --muted: #a7b0c0;
      --primary: #d04fff;
      --primary-2: #ff6ad0;
      --shadow: 0 10px 30px rgba(0, 0, 0, .45);
    }
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #f6f8fb;
        --bg-2: #eef2f8;
        --card: rgba(255,255,255,.75);
        --card-2: rgba(255,255,255,.6);
        --text: #0f172a;
        --muted: #5b6475;
        --primary: #d04fff;
        --primary-2: #ff6ad0;
        --shadow: 0 10px 30px rgba(57,72,103,.15);
      }
    }

    @media (max-width: 1024px), (hover: none) and (pointer: coarse) {
      :root {
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family:"Pretendard",system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
      color:var(--text); background:var(--bg);
      display:block; overflow:auto;
    }

    /* background blobs */
    .blob-container{
      position:fixed; inset:0; overflow:hidden; z-index:-1;
      background: radial-gradient(1200px 800px at 10% -10%, #5a6cff20, transparent 60%),
                  radial-gradient(1200px 800px at 110% 10%, #ff009025, transparent 60%),
                  radial-gradient(1000px 700px at 50% 120%, #ff00b325, transparent 60%);
    }
    .blob{position:absolute; filter:blur(40px); opacity:.6; pointer-events:none}
    .b1{width:48vw;height:48vw;background:radial-gradient(circle,#ff6a6a60,transparent 70%); top:-10vh; left:-10vw; animation:float 18s ease-in-out infinite}
    .b2{width:42vw;height:42vw;background:radial-gradient(circle,#038b2550,transparent 70%); bottom:-15vh; right:-10vw; animation:float 22s ease-in-out infinite reverse}
    .b3{width:36vw;height:36vw;background:radial-gradient(circle,#ff6ae950,transparent 70%); top:40vh; left:10vw; animation:float 26s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}

    /* shell */
    header{
      position:sticky; top:0; z-index:5;
      padding:16px clamp(12px,3vw,24px);
      backdrop-filter:saturate(140%) blur(12px);
      background:linear-gradient(180deg,var(--card),transparent);
      border-bottom:1px solid color-mix(in oklab, var(--text) 10%, transparent);
    }
    .toolbar{display:flex; gap:8px; align-items:center; justify-content:space-between; flex-wrap:wrap}
    .title{font-weight:800; letter-spacing:.2px; display:flex; gap:10px; align-items:center}
    .title .dot{width:12px;height:12px;border-radius:999px; background:var(--primary); box-shadow:0 0 10px color-mix(in oklab,var(--primary) 50%, transparent)}
    .controls{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
    select,button{
      height:40px; padding:0 12px; border-radius:12px; border:1px solid color-mix(in oklab, var(--text) 15%, transparent);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      color:var(--text); font-weight:600; cursor:pointer;
      transition:all .2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    button:active{
      transform:scale(0.96);
      box-shadow:0 0 0 4px color-mix(in oklab, var(--primary) 15%, transparent);
    }
    button.cta{background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; border:0}
    button.cta:active{
      box-shadow:0 0 0 4px color-mix(in oklab, var(--primary) 20%, transparent), 0 4px 12px rgba(208, 79, 255, .3);
    }
    button.ghost{background:transparent}
    button.ghost:active{
      box-shadow:0 0 0 4px color-mix(in oklab, var(--text) 10%, transparent);
    }

    main{
      width:min(1100px,92vw); margin:18px auto 28px; display:grid; gap:18px;
      grid-template-columns:1fr 1fr;
      grid-template-areas:"left right" "countdown countdown" "calendar calendar";
    }
    @media (max-width: 980px){ main{grid-template-columns:1fr; grid-template-areas:"left" "right" "countdown" "calendar"} }

    .panel{
      grid-area:var(--area);
      position:relative; overflow:clip; border-radius:var(--radius);
      background:linear-gradient(180deg,var(--card),var(--card-2));
      backdrop-filter:saturate(140%) blur(14px); box-shadow:var(--shadow);
      padding:20px;
    }
    .head{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px}
    .head h2{margin:0; font-size:18px}
    .sub{color:var(--muted); font-size:13px}
    .notice-mini{
      border:1px solid color-mix(in oklab, var(--text) 12%, transparent);
      border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      padding:12px;
      margin-bottom:12px;
    }
    .notice-mini-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;}
    .notice-mini-title{font-size:15px;font-weight:700;}
    .notice-view-all{
      border:none;
      background:transparent;
      color:var(--primary);
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      padding:0;
      height:auto;
    }
    .notice-mini-item{
      font-size:14px;
      line-height:1.45;
      color:var(--text);
      border-radius:10px;
      padding:8px 10px;
      background:rgba(255,255,255,.05);
    }
    .notice-mini-meta{
      margin-top:6px;
      font-size:12px;
      color:var(--muted);
    }
    .notice-empty{font-size:13px;color:var(--muted);}
    .notice-modal-list{
      display:grid;
      gap:10px;
      max-height:58vh;
      overflow:auto;
    }
    .notice-modal-item{
      border:1px solid color-mix(in oklab, var(--text) 12%, transparent);
      border-radius:12px;
      padding:10px 12px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    }
    .notice-modal-item .meta{
      margin-top:6px;
      font-size:12px;
      color:var(--muted);
    }

    .list{display:grid; gap:8px}
    .row{
      display:grid; grid-template-columns:64px 1fr; gap:10px; align-items:start;
      padding:12px; border:1px solid color-mix(in oklab, var(--text) 12%, transparent); border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    }
    .period{font-weight:800; text-align:center; border-right:1px dashed color-mix(in oklab, var(--text) 20%, transparent)}
    .subject{font-weight:700}
    .empty{padding:14px; border:1px dashed color-mix(in oklab, var(--text) 18%, transparent); border-radius:12px; color:var(--muted)}

    .meal-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px}
    @media (max-width:700px){ .meal-grid{grid-template-columns:1fr} }
    .meal-card{
      padding:14px; border-radius:16px; border:1px solid color-mix(in oklab, var(--text) 12%, transparent);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    }
    .meal-card h3{margin:0 0 8px; font-size:16px}
    .meal-card ul{margin:0; padding-left:18px}
    .meal-card li{margin:2px 0}

    .time{position:absolute; top:16px; right:16px; font-size:12px; color:var(--muted)}

    /* modal for weekly timetable + meal from etc.js style */
    .modal-overlay{
      position:fixed; inset:0; background:rgba(0,0,0,.35); backdrop-filter:blur(6px);
      display:grid; place-items:center; opacity:0; pointer-events:none; transition:.2s ease;
      z-index:50;
    }
    .modal-overlay.visible{opacity:1; pointer-events:auto}
    .modal{
      width:min(920px,92vw); max-height:80vh; overflow:auto;
      background:linear-gradient(180deg,var(--card),var(--card-2)); border:1px solid color-mix(in oklab, var(--text) 14%, transparent);
      border-radius:18px; box-shadow:var(--shadow); padding:18px;
    }
    .modal .modal-head{display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:12px}
    .modal .modal-title{margin:0; font-size:18px}
    .modal .modal-close{height:36px; aspect-ratio:1/1; border-radius:10px; border:1px solid color-mix(in oklab, var(--text) 12%, transparent); background:transparent; color:var(--text); font-size:20px}
    .modal table{width:100%; border-collapse:collapse; font-size:14px}
    .modal th,.modal td{border:1px solid color-mix(in oklab, var(--text) 14%, transparent); padding:8px 10px; text-align:center}
    .modal thead th{position:sticky; top:0; background:color-mix(in oklab, var(--card) 80%, rgba(255,255,255,.1));}

    .fade-up{opacity:0; transform:translateY(10px); animation:rise .6s ease forwards}
    @keyframes rise{to{opacity:1; transform:none}}

    .spacer {
      height: calc(68px + 80px + var(--safe-bottom));
    }

    /* Bottom Navigation - Floating Rounded Style */
    .bottom-nav {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(480px, calc(100% - 32px));
      height: 68px;
      padding: 8px 12px calc(8px + var(--safe-bottom));
      display: flex;
      background: linear-gradient(180deg, var(--card), var(--card-2));
      backdrop-filter: saturate(180%) blur(20px);
      border-radius: 24px;
      border: 1px solid color-mix(in oklab, var(--text) 12%, transparent);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .3), 0 0 0 1px rgba(255, 255, 255, .08) inset;
      z-index: 1000;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      padding: 8px 4px;
      border-radius: 16px;
      transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .nav-item:hover {
      color: var(--text);
      background: rgba(255, 255, 255, .06);
    }
    .nav-item.active {
      color: var(--primary);
      background: color-mix(in oklab, var(--primary) 12%, transparent);
    }
    .nav-item svg {
      width: 24px;
      height: 24px;
      transition: transform .25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nav-item:active svg {
      transform: scale(0.85);
    }

    .weather-card{
      grid-column: 1 / -1;
      padding: 20px;
      border-radius: 20px;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: linear-gradient(145deg, #667aff, #5ad4ff);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      transition: background .4s ease;
      width:min(1100px,92vw); 
      margin:18px auto 28px;
    }

    .wc-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .wc-temp{
      font-size:48px;
      font-weight:800;
    }

    .wc-desc{
      font-size:18px;
      font-weight:600;
      opacity:.9;
    }

    .wc-bottom{
      display:flex;
      justify-content:flex-start;
      gap:20px;
      font-size:15px;
      font-weight:600;
      margin-top:5px;
    }

    .wc-item{
      opacity:.9;
    }

    .wc-comment{
      margin-top:10px;
      font-size:14px;
      line-height:1.4;
      opacity:.95;
    }

    /* 그라디언트 테마 프리셋 */
    .weather-clear{
      background: linear-gradient(145deg, #ffb75e, #ff7c7c);
    }

    .weather-cloudy{
      background: linear-gradient(145deg, #8e9eab, #eef2f3);
      color:#0b0f14;
    }

    .weather-rain{
      background: linear-gradient(145deg, #4e54c8, #8f94fb);
    }

    .weather-snow{
      background: linear-gradient(145deg, #b6fbff, #83a4d4);
      color:#0b0f14;
    }

    /* Vote buttons */
    .vote-btn:hover {
      transform: scale(1.05);
      border-color: color-mix(in oklab, var(--primary) 50%, transparent);
    }
    .vote-btn:active {
      transform: scale(0.95);
    }
    .vote-btn.selected {
      background: color-mix(in oklab, var(--primary) 15%, transparent);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--primary) 20%, transparent);
    }

    /* Calendar styles */
    .calendar-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    }
    .calendar-event {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid color-mix(in oklab, var(--text) 12%, transparent);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      transition: all .2s ease;
    }
    .calendar-event:hover {
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.08));
      border-color: color-mix(in oklab, var(--primary) 30%, transparent);
    }
    .calendar-event.past {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border-color: color-mix(in oklab, var(--text) 8%, transparent);
      color: var(--muted);
      opacity: .75;
    }
    .event-date {
      font-size: 12px;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .calendar-event.past .event-date,
    .calendar-event.past .event-title,
    .calendar-event.past .event-description {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 1px;
      text-decoration-color: color-mix(in oklab, var(--muted) 90%, transparent);
    }
    .event-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .event-description {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }
    .event-actions {
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }
    .event-btn {
      font-size: 11px;
      padding: 4px 10px;
      height: auto;
      border-radius: 8px;
    }

    /* Countdown controls */
    .countdown-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .countdown-controls input[type="date"],
    .countdown-controls input[type="time"] {
      height: 36px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid color-mix(in oklab, var(--text) 15%, transparent);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      color: var(--text);
      font-weight: 600;
      font-size: 14px;
      flex: 1;
      min-width: 120px;
    }
    .countdown-controls input[type="date"]::-webkit-calendar-picker-indicator,
    .countdown-controls input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) .countdown-controls input[type="date"]::-webkit-calendar-picker-indicator,
      :root:not([data-theme="dark"]) .countdown-controls input[type="time"]::-webkit-calendar-picker-indicator {
        filter: invert(0);
      }
    }
    :root[data-theme="light"] .countdown-controls input[type="date"]::-webkit-calendar-picker-indicator,
    :root[data-theme="light"] .countdown-controls input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0);
    }
    @media (max-width: 600px) {
      .countdown-controls {
        width: 100%;
      }
      .countdown-controls input[type="date"],
      .countdown-controls input[type="time"] {
        flex: 1 1 calc(50% - 4px);
        min-width: 0;
      }
      .countdown-controls button {
        flex: 1 1 calc(50% - 4px);
      }
    }
  </style>
</head>
<body>
<div class="blob-container" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<header>
  <div class="toolbar">
    <!--      <div class="title"><span class="dot" aria-hidden="true"></span>학교 생활</div>-->
    <div class="controls">
      <label for="gradeSel" class="sr-only">학년</label>
      <select id="gradeSel" aria-label="학년 선택"></select>
      <label for="classSel" class="sr-only">반</label>
      <select id="classSel" aria-label="반 선택"></select>
      <button id="refreshBtn" class="ghost" type="button">↻</button>
      <button id="weeklyBtn" class="cta" type="button">주간</button>
    </div>
  </div>
</header>

<!-- 오늘 날씨 카드 -->
<section class="weather-card fade-up" id="weatherCard">
  <div class="wc-top">
    <div class="wc-temp" id="wcTemp">--°</div>
    <div class="wc-desc" id="wcDesc">날씨 불러오는 중…</div>
  </div>
  <div class="wc-bottom">
    <div class="wc-item"><span id="wcHigh">--°</span> / <span id="wcLow">--°</span></div>
    <div class="wc-item" id="wcRain">강수확률 --%</div>
  </div>
  <div class="wc-comment" id="wcComment">오늘 날씨 정보를 불러오는 중…</div>
</section>

<main>
  <!-- 왼쪽: 오늘 시간표 -->
  <section class="panel fade-up" style="--area:left" aria-labelledby="tt-h">
    <div id="schoollifeNoticeSection" class="notice-mini">
      <div class="notice-mini-head">
        <div class="notice-mini-title">공지</div>
        <button id="noticeViewAllBtn" class="notice-view-all" type="button">전체 보기 -&gt;</button>
      </div>
      <div id="schoollifeNoticeLatest" class="notice-empty">공지 불러오는 중…</div>
    </div>
    <!-- <div class="time" id="nowClock">&#45;&#45;:&#45;&#45;:&#45;&#45;</div> -->
    <div class="head">
      <h2 id="tt-h">오늘 시간표</h2>
      <div class="sub" id="tt-sub"></div>
    </div>
    <div id="timetableToday" class="list" role="list"></div>
  </section>

  <!-- 오른쪽: 오늘 급식 -->
  <section class="panel fade-up" style="--area:right" aria-labelledby="meal-h">
    <div class="head">
      <h2 id="meal-h">오늘 급식</h2>
      <div class="sub" id="meal-sub"></div>
    </div>
    <div class="meal-grid" id="mealGrid">
      <div class="meal-card"><h3>아침</h3><div class="empty">불러오는 중…</div></div>
      <div class="meal-card"><h3>점심</h3><div class="empty">불러오는 중…</div></div>

<script>
  // -------- util: clock --------

  // -------- storage helpers (compat with etc.js keys) --------
  function saveData(key, value){
    try{
      if (value === undefined || value === null){
        localStorage.removeItem(key);
        return;
      }
      localStorage.setItem(key, JSON.stringify(value));
    }catch(err){
      console.warn('[storage] save failed', err);
    }
  }
  function loadData(key){
    try{
      const raw = localStorage.getItem(key);
      if (raw === null || raw === 'undefined'){
        return null;
      }
      try{
        return JSON.parse(raw);
      }catch(parseErr){
        return raw;
      }
    }catch(err){
      console.warn('[storage] load failed', err);
      return null;
    }
  }

  const SCHOOLLIFE_STORAGE_KEYS = {
    grade: 'schoollife:last_grade',
    section: 'schoollife:last_class',
  };

  const authState = {
    loggedIn: false,
    role: null,
    grade: null,
    section: null,
    number: null,
  };

  function toPositiveInt(value){
    const parsed = Number(value);
    return Number.isFinite(parsed) && parsed > 0 ? parsed : null;
  }

  function getUrlClassSelection(){
    const params = new URLSearchParams(window.location.search);
    return {
      grade: toPositiveInt(params.get('grade')),
      section: toPositiveInt(params.get('section') || params.get('class')),
    };
  }

  function loadSavedSelection(keyName, legacyKey){
    const current = loadData(keyName);
    if (current !== null && current !== undefined && current !== '') return String(current);
    const legacy = loadData(legacyKey);
    if (legacy !== null && legacy !== undefined && legacy !== '') return String(legacy);
    return null;
  }

  function saveCurrentClassSelection(){
    saveData(SCHOOLLIFE_STORAGE_KEYS.grade, gradeSel.value);
    saveData(SCHOOLLIFE_STORAGE_KEYS.section, classSel.value);
  }

  async function loadAuthStatus(){
    try{
      const response = await fetch('/auth/status', {
        credentials: 'include',
        cache: 'no-store',
      });
      if (!response.ok) return null;
      return await response.json();
    }catch(error){
      console.warn('[Schoollife] auth status load failed', error);
      return null;
    }
  }

  async function hydrateClassSelection(){
    const auth = await loadAuthStatus();
    const urlSelection = getUrlClassSelection();
    const savedGrade = loadSavedSelection(SCHOOLLIFE_STORAGE_KEYS.grade, 'last_grade');
    const savedSection = loadSavedSelection(SCHOOLLIFE_STORAGE_KEYS.section, 'last_class');

    authState.loggedIn = Boolean(auth?.logged_in);
    authState.role = auth?.role || null;
    authState.grade = toPositiveInt(auth?.grade);
    authState.section = toPositiveInt(auth?.section || auth?.class);
    authState.number = toPositiveInt(auth?.number);

    let nextGrade = savedGrade || '1';
    let nextSection = savedSection || '1';

    if (authState.loggedIn && authState.grade && authState.section) {
      if (authState.role === 'teacher') {
        nextGrade = savedGrade || String(authState.grade);
        nextSection = savedSection || String(authState.section);
      } else {
        nextGrade = String(authState.grade);
        nextSection = String(authState.section);
      }
    }

    if (urlSelection.grade) nextGrade = String(urlSelection.grade);
    if (urlSelection.section) nextSection = String(urlSelection.section);

    gradeSel.value = nextGrade;
    classSel.value = nextSection;
    saveCurrentClassSelection();
  }

  // -------- select init --------
  const gradeSel = document.getElementById('gradeSel');
  const classSel = document.getElementById('classSel');
  (function initSelectors(){
    for(let g=1; g<=3; g++){ const o=document.createElement('option'); o.value=String(g); o.textContent=`${g}학년`; gradeSel.appendChild(o); }
    for(let c=1; c<=6; c++){ const o=document.createElement('option'); o.value=String(c); o.textContent=`${c}반`; classSel.appendChild(o); }
    gradeSel.value = '1';
    classSel.value  = '1';
    gradeSel.addEventListener('change', onSelChange);
    classSel.addEventListener('change', onSelChange);
  })();

  function onSelChange(){
    saveCurrentClassSelection();
    loadAllSchoollifeData();
  }

  // -------- API helpers --------
  async function fetchJson(url, options = {}) {
    const response = await fetch(url, {
      credentials: 'include',
      cache: 'no-store',
      ...options,
    });
    const text = await response.text();
    let payload = null;
    if (text) {
      try {
        payload = JSON.parse(text);
      } catch (error) {
        payload = text;
      }
    }
    if (!response.ok) {
      const message =
        payload?.error?.message ||
        payload?.error ||
        `HTTP error! status: ${response.status}`;
      const fetchError = new Error(message);
      fetchError.status = response.status;
      fetchError.payload = payload;
      throw fetchError;
    }
    return payload;
  }

  function getSelectedGradeSection(){
    return {
      grade: toPositiveInt(gradeSel.value),
      section: toPositiveInt(classSel.value),
    };
  }

  function describeProtectedClassFeature(featureName){
    const { grade, section } = getSelectedGradeSection();
    if (!authState.loggedIn) {
      return `${featureName} 로그인 후 이용할 수 있습니다.`;
    }
    if (
      authState.role === 'student' &&
      authState.grade &&
      authState.section &&
      grade &&
      section &&
      (authState.grade !== grade || authState.section !== section)
    ) {
      return `${featureName} 내 반에서만 볼 수 있습니다.`;
    }
    return `${featureName} 불러올 수 없습니다.`;
  }

  function applyWeatherGradient(desc){
    const card = document.getElementById('weatherCard');
    if (!card) return;
    const lower = (desc || '').toLowerCase();
    card.classList.remove('weather-clear','weather-cloudy','weather-rain','weather-snow');
    if (lower.includes('비') || lower.includes('rain')) {
      card.classList.add('weather-rain');
    } else if (lower.includes('눈') || lower.includes('snow')) {
      card.classList.add('weather-snow');
    } else if (lower.includes('구름') || lower.includes('cloud') || lower.includes('흐림')) {
      card.classList.add('weather-cloudy');
    } else {
      card.classList.add('weather-clear');
    }
  }

  function applyWeatherGradient(desc){
    const card = document.getElementById('weatherCard');
    if (!card) return;
    const lower = (desc || '').toLowerCase();
    card.classList.remove('weather-clear','weather-cloudy','weather-rain','weather-snow');
    if (lower.includes('비')) {
      card.classList.add('weather-rain');
    } else if (lower.includes('눈')) {
      card.classList.add('weather-snow');
    } else if (lower.includes('구름') || lower.includes('흐림') || lower.includes('cloud')) {
      card.classList.add('weather-cloudy');
    } else {
      card.classList.add('weather-clear');
    }
  }

  function renderWeather(data){
    const tempEl = document.getElementById('wcTemp');
    const descEl = document.getElementById('wcDesc');
    const highEl = document.getElementById('wcHigh');
    const lowEl = document.getElementById('wcLow');
    const rainEl = document.getElementById('wcRain');
    const temp = data?.temperature;
    const desc = data?.desc || '날씨 정보를 불러올 수 없습니다.';
    if (tempEl) tempEl.textContent = temp != null ? `${Math.round(temp)}°` : '--°';
    if (descEl) descEl.textContent = desc;
    if (highEl) highEl.textContent = data?.high != null ? `${Math.round(data.high)}°` : '--°';
    if (lowEl) lowEl.textContent = data?.low != null ? `${Math.round(data.low)}°` : '--°';
    if (rainEl) rainEl.textContent = `강수확률 ${data?.rain != null ? data.rain : '--'}%`;
    applyWeatherGradient(desc);
  }

  // -------- timetable (based on etc.js NEIS example) --------
  const ATPT_OFCDC_SC_CODE='J10';     // 경기도교육청
  const SD_SCHUL_CODE='7530560';      // 한국디지털미디어고
  const API_KEY='da82433f0f3a4351bda4ca9a0f11fc7d'; // from etc.js sample

  function fmtYYYYMMDD(date){
    const y=date.getFullYear();
    const m=String(date.getMonth()+1).padStart(2,'0');
    const d=String(date.getDate()).padStart(2,'0');
    return `${y}${m}${d}`;
  }
  function fmtYYYY_MM_DD(date){
    const y=date.getFullYear();
    const m=String(date.getMonth()+1).padStart(2,'0');
    const d=String(date.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  function weekMonToFri(date=new Date()){
    const day = date.getDay(); // 0(일)~6(토)
    const diff = date.getDate() - day + (day===0 ? -6 : 1); // 월요일
    const monday = new Date(date); monday.setDate(diff); 
    return Array.from({length:5},(_,i)=>{const t=new Date(monday); t.setDate(monday.getDate()+i); return t;});
  }

  function timetableCacheKey(g,c,weekStart){ return `timetable_${g}_${c}_${weekStart}` }

  function normalizeSubject(r){
    return r.ITRT_CNTNT || r.SUBJECT || r.SUB_NM || '';
  }

  function fmtDateKR(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    if (Number.isNaN(date.getTime())) return dateStr;
    const yoil = ['일','월','화','수','목','금','토'][date.getDay()];
    return `${date.getFullYear()}.${date.getMonth()+1}.${date.getDate()} (${yoil})`;
  }

  function buildWeatherComment(data){
    const temp = Number(data?.temperature);
    const high = Number(data?.high);
    const low = Number(data?.low);
    const rain = Number(data?.rain);
    const comments = [];

    if (!Number.isNaN(temp)) {
      if (temp <= -3) comments.push('두꺼운 외투와 장갑이 필요해요.');
      else if (temp <= 5) comments.push('찬바람이 불어요. 겹겹이 입으세요.');
      else if (temp >= 28) comments.push('무더운 날씨, 수분 보충 잊지 마세요!');
      else if (temp >= 22) comments.push('한여름 같은 더위입니다. 시원한 옷차림 추천!');
    }

    if (!Number.isNaN(rain)) {
      if (rain >= 70) comments.push('우산 필수! 비 올 확률이 높아요.');
      else if (rain >= 40) comments.push('소나기가 올 수도 있으니 우산 확인!');
      else if (rain <= 10) comments.push('비 소식은 거의 없어요.');
    }

    if (!comments.length) {
      if (!Number.isNaN(high) && !Number.isNaN(low)) {
        comments.push(`오늘 기온 ${Math.round(low)}° ~ ${Math.round(high)}° 예정입니다.`);
      } else {
        comments.push('쾌적한 하루 보내세요!');
      }
    }

    return comments.join(' ');
  }

  function renderWeather(data){
    const tempEl = document.getElementById('wcTemp');
    const descEl = document.getElementById('wcDesc');
    const highEl = document.getElementById('wcHigh');
    const lowEl = document.getElementById('wcLow');
    const rainEl = document.getElementById('wcRain');
    const commentEl = document.getElementById('wcComment');
    const temp = data?.temperature;
    const desc = data?.desc || '날씨 정보를 불러올 수 없습니다.';
    if (tempEl) tempEl.textContent = temp != null ? `${Math.round(temp)}°` : '--°';
    if (descEl) descEl.textContent = desc;
    if (highEl) highEl.textContent = data?.high != null ? `${Math.round(data.high)}°` : '--°';
    if (lowEl) lowEl.textContent = data?.low != null ? `${Math.round(data.low)}°` : '--°';
    if (rainEl) rainEl.textContent = `강수확률 ${data?.rain != null ? data.rain : '--'}%`;
    if (commentEl) commentEl.textContent = buildWeatherComment(data);
    applyWeatherGradient(desc);
  }

  function showWeatherError(message){
    console.error('[Schoollife] weather load failed:', message);
    const fallback = {
      temperature: null,
      desc: '날씨 정보를 불러올 수 없습니다.',
      high: null,
      low: null,
      rain: null,
    };
    renderWeather(fallback);
    const commentEl = document.getElementById('wcComment');
    if (commentEl) {
      commentEl.textContent = '날씨 데이터를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.';
    }
  }

  // Remove old timetable fetching logic; server supplies data
  function renderTimetable(payload){
    const list = document.getElementById('timetableToday');
    const sub  = document.getElementById('tt-sub');
    list.innerHTML = '';

    const lessons = payload?.lessons || [];
    sub.textContent = fmtDateKR(payload?.date) || '오늘 시간표';

    if (!lessons.length) {
      list.innerHTML = `<div class="empty">${payload?.message || '오늘 등록된 시간표가 없습니다.'}</div>`;
      return;
    }

    lessons.forEach(item => {
      const period = item.period ? `${item.period}교시` : '수업';
      const subject = item.subject || '미상';
      const teacher = item.teacher ? `(${item.teacher})` : '';
      const div = document.createElement('div');
      div.className='row';
      div.innerHTML = `
        <div class="period">${period}</div>
        <div>
          <div class="subject">${subject}</div>
          <div class="sub">${teacher}</div>
        </div>`;
      list.appendChild(div);
    });
  }

  // -------- weekly modal render --------
  function openWeekly(wrapped){
    const ov = document.getElementById('weeklyOverlay');
    const cont = document.getElementById('weeklyContainer');
    ov.hidden=false; requestAnimationFrame(()=>ov.classList.add('visible'));

    const days=['월','화','수','목','금'];
    const maxP=7;

    let html = '<table><thead><tr><th>교시</th>';
    for(const d of days) html += `<th>${d}</th>`;
    html += '</tr></thead><tbody>';

    for(let p=1;p<=maxP;p++){
      html += `<tr><td>${p}</td>`;
      for(let di=0; di<5; di++){
        const rowList = (wrapped.data[di]||[]).filter(x=>Number(x.PERIO)===p);
        const cell = rowList.length
          ? Array.from(new Set(rowList.map(x=>normalizeSubject(x)).filter(Boolean))).join('<br>')
          : '';
        html += `<td>${cell}</td>`;
      }
      html += '</tr>';
    }
    html += '</tbody></table>';

    cont.innerHTML = html;
  }
  document.getElementById('weeklyClose').addEventListener('click', closeWeekly);
  document.getElementById('weeklyOverlay').addEventListener('click', (e)=>{ if(e.target.id==='weeklyOverlay') closeWeekly(); });
  function closeWeekly(){
    const ov = document.getElementById('weeklyOverlay');
    ov.classList.remove('visible');
    ov.addEventListener('transitionend', ()=>{ ov.hidden=true; }, { once:true });
  }

  // -------- notices --------
  let noticeFirstLoaded = false;

  function getNoticeQueryView() {
    const params = new URLSearchParams(window.location.search);
    return (params.get('view') || '').toLowerCase();
  }

  function buildNoticeLink(grade, section){
    return `/schoollife.html?grade=${grade}&section=${section}&view=notices`;
  }

  function formatNoticeDatetime(createdAt){
    if (!createdAt) return '';
    const date = new Date(createdAt);
    if (Number.isNaN(date.getTime())) return '';
    return date.toLocaleString('ko-KR', {
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function trimNoticeText(text, max = 90){
    const value = String(text || '').trim();
    if (value.length <= max) return value;
    return `${value.slice(0, max)}...`;
  }

  function getNoticeNotifyStorageKey(grade, section) {
    return `dimicheck:lastNoticeNotification:${grade}-${section}`;
  }

  async function maybeNotifyNewNotice(notice, grade, section) {
    if (!notice?.id) return;
    const key = getNoticeNotifyStorageKey(grade, section);
    let saved = 0;
    try {
      saved = Number(localStorage.getItem(key) || 0);
    } catch (_) {
      saved = 0;
    }
    if (!noticeFirstLoaded) {
      try {
        localStorage.setItem(key, String(notice.id));
      } catch (_) {}
      return;
    }
    if (saved >= notice.id) return;
    try {
      localStorage.setItem(key, String(notice.id));
    } catch (_) {}
    window.notificationManager?.notifyTeacherNotice?.(notice, { grade, section });
  }

  function renderSchoollifeLatestNotice(notice, hasUnread) {
    const container = document.getElementById('schoollifeNoticeLatest');
    if (!container) return;
    if (!notice) {
      container.className = 'notice-empty';
      container.textContent = '등록된 공지가 없습니다.';
      return;
    }
    const meta = `${notice.teacherName || '선생님'} · ${formatNoticeDatetime(notice.createdAt)}`;
    const unreadLabel = hasUnread ? '새 공지' : '최근 공지';
    container.className = 'notice-mini-item';
    container.innerHTML = `
      <div>[${unreadLabel}] ${escapeHtml(trimNoticeText(notice.text, 120))}</div>
      <div class="notice-mini-meta">${escapeHtml(meta)}</div>
    `;
  }

  async function loadLatestNotice() {
    const { grade, section } = getSelectedGradeSection();
    if (!grade || !section) return;
    try {
      const payload = await fetchJson(`/api/classes/notices?grade=${grade}&section=${section}&mode=latest`);
      const notice = payload?.notices?.[0] || null;
      renderSchoollifeLatestNotice(notice, payload?.hasUnread);
      await maybeNotifyNewNotice(notice, grade, section);
    } catch (error) {
      console.error('[Schoollife] failed to load notice', error);
      const container = document.getElementById('schoollifeNoticeLatest');
      if (container) {
        container.className = 'notice-empty';
        container.textContent = '공지를 불러오지 못했습니다.';
      }
    } finally {
      noticeFirstLoaded = true;
    }
  }

  function openNoticeOverlay() {
    const overlay = document.getElementById('noticeOverlay');
    if (!overlay) return;
    overlay.hidden = false;
    requestAnimationFrame(() => overlay.classList.add('visible'));
  }

  function closeNoticeOverlay() {
    const overlay = document.getElementById('noticeOverlay');
    if (!overlay) return;
    overlay.classList.remove('visible');
    overlay.addEventListener('transitionend', () => {
      overlay.hidden = true;
    }, { once: true });
  }

  async function markNoticesReadAll() {
    const { grade, section } = getSelectedGradeSection();
    if (!grade || !section) return;
    try {
      await fetchJson(`/api/classes/notices/read?grade=${grade}&section=${section}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ all: true }),
      });
    } catch (error) {
      console.warn('[Schoollife] failed to mark notices read', error);
    }
  }

  async function openNoticeModal() {
    openNoticeOverlay();
    const list = document.getElementById('noticeModalList');
    if (list) {
      list.innerHTML = '<div class="notice-empty">공지 불러오는 중…</div>';
    }

    const { grade, section } = getSelectedGradeSection();
    if (!grade || !section) return;
    try {
      const payload = await fetchJson(`/api/classes/notices?grade=${grade}&section=${section}&mode=all`);
      const notices = Array.isArray(payload?.notices) ? payload.notices : [];
      if (!list) return;
      if (!notices.length) {
        list.innerHTML = '<div class="notice-empty">등록된 공지가 없습니다.</div>';
      } else {
        list.innerHTML = notices.map((notice) => {
          const meta = `${notice.teacherName || '선생님'} · ${formatNoticeDatetime(notice.createdAt)}`;
          return `
            <div class="notice-modal-item">
              <div>${escapeHtml(notice.text || '')}</div>
              <div class="meta">${escapeHtml(meta)}</div>
            </div>
          `;
        }).join('');
      }
      await markNoticesReadAll();
      await loadLatestNotice();
    } catch (error) {
      console.error('[Schoollife] failed to load full notices', error);
      if (list) list.innerHTML = '<div class="notice-empty">공지를 불러오지 못했습니다.</div>';
    }
  }

  document.getElementById('noticeViewAllBtn').addEventListener('click', () => {
    openNoticeModal();
  });
  document.getElementById('noticeCloseBtn').addEventListener('click', closeNoticeOverlay);
  document.getElementById('noticeOverlay').addEventListener('click', (event) => {
    if (event.target?.id === 'noticeOverlay') {
      closeNoticeOverlay();
    }
  });

  // -------- meal (based on etc.js example) --------
  function getTodayDateStringDash(){ return fmtYYYY_MM_DD(new Date()); }
  // Remove old external meal fetcher
  function renderMeal(data){
    const grid = document.getElementById('mealGrid');
    const sub = document.getElementById('meal-sub');
    if (sub) sub.textContent = (data?.date || '').replace(/-/g,'.');

    const entries = [
      {title:'아침', text:data?.breakfast},
      {title:'점심', text:data?.lunch},
      {title:'저녁', text:data?.dinner},
    ];
    grid.innerHTML = '';
    for(const {title,text} of entries){
      const card = document.createElement('div');
      card.className='meal-card';
      if (text) {
        const items = text.split('\n').filter(Boolean).map(s=>`<li>${s.replace(/\*|\./g,'').trim()}</li>`).join('');
        card.innerHTML = `<h3>${title}</h3><ul>${items}</ul>`;
      } else {
        card.innerHTML = `<h3>${title}</h3><div class="empty">정보 없음</div>`;
      }
      grid.appendChild(card);
    }
  }

  function showMealError(message){
    console.error('[Schoollife] meal load failed:', message);
    const grid = document.getElementById('mealGrid');
    const sub = document.getElementById('meal-sub');
    if (sub) sub.textContent = '급식 정보를 불러올 수 없습니다.';
    if (grid) {
      grid.innerHTML = '<div class="meal-card"><h3>알림</h3><div class="empty">급식 데이터를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</div></div>';
    }
  }

  function showTimetableError(message){
    console.error('[Schoollife] timetable load failed:', message);
    const list = document.getElementById('timetableToday');
    if (list) {
      list.innerHTML = '<div class="empty">시간표를 불러오지 못했습니다.<br>잠시 후 다시 시도해 주세요.</div>';
    }
  }

  // -------- load all --------
  async function loadTodayAll(){
    const list = document.getElementById('timetableToday');
    list.innerHTML = '<div class="empty">시간표 불러오는 중…</div>';
    const g = gradeSel.value, c = classSel.value;
    try {
      const [weatherResult, mealResult, timetableResult] = await Promise.allSettled([
        fetchJson('/api/classes/schoollife/weather'),
        fetchJson('/api/classes/schoollife/meal'),
        fetchJson(`/api/classes/schoollife/timetable?grade=${g}&section=${c}`)
      ]);

      if (weatherResult.status === 'fulfilled') {
        renderWeather(weatherResult.value);
      } else {
        showWeatherError(weatherResult.reason);
      }

      if (mealResult.status === 'fulfilled') {
        renderMeal(mealResult.value);
      } else {
        showMealError(mealResult.reason);
      }

      if (timetableResult.status === 'fulfilled') {
        renderTimetable(timetableResult.value);
      } else {
        showTimetableError(timetableResult.reason);
      }
    } catch(e) {
      console.error("loadTodayAll error:", e);
      showWeatherError(e);
      showMealError(e);
      showTimetableError(e);
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', loadAllSchoollifeData);

  // -------- Meal Vote --------
  async function loadMealVoteStats(){
    const g = gradeSel.value, c = classSel.value;
    try {
      const res = await fetchJson(`/api/classes/schoollife/meal/stats?grade=${g}&section=${c}`);
      const statsEl = document.getElementById('mealVoteStats');
      const thumbsUpBtn = document.getElementById('mealThumbsUp');
      const thumbsDownBtn = document.getElementById('mealThumbsDown');

      // Clear selection
      thumbsUpBtn.classList.remove('selected');
      thumbsDownBtn.classList.remove('selected');

      // Show stats
      if (res.totalCount === 0) {
        statsEl.textContent = '아직 투표한 학생이 없습니다';
      } else {
        statsEl.textContent = `우리 학교 학생의 ${res.percentage}%가 오늘 급식이 맛있다고 생각해요 (${res.positiveCount}/${res.totalCount}명)`;
      }

      // Highlight user's vote
      if (res.myVote === true) {
        thumbsUpBtn.classList.add('selected');
      } else if (res.myVote === false) {
        thumbsDownBtn.classList.add('selected');
      }
    } catch(e) {
      console.error('Failed to load meal vote stats:', e);
      const message = e?.status === 403
        ? describeProtectedClassFeature('투표 정보는')
        : '투표 정보를 불러올 수 없습니다';
      document.getElementById('mealVoteStats').textContent = message;
    }
  }

  async function voteMeal(isPositive){
    const g = gradeSel.value, c = classSel.value;
    try {
      await fetchJson(`/api/classes/schoollife/meal/vote?grade=${g}&section=${c}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({isPositive})
      });
      await loadMealVoteStats();
    } catch(e) {
      console.error('Failed to vote:', e);
      alert(e?.status === 403 ? '급식 투표는 내 반에서만 할 수 있습니다.' : '투표에 실패했습니다');
    }
  }

  document.getElementById('mealThumbsUp').addEventListener('click', () => voteMeal(true));
  document.getElementById('mealThumbsDown').addEventListener('click', () => voteMeal(false));

  // -------- Calendar --------
  let calendarEvents = [];

  async function loadCalendarEvents(){
    const g = gradeSel.value, c = classSel.value;
    try {
      const res = await fetchJson(`/api/classes/calendar/events?grade=${g}&section=${c}`);
      calendarEvents = res.events || [];
      renderCalendar();
    } catch(e) {
      console.error('Failed to load calendar events:', e);
      const message = e?.status === 403
        ? describeProtectedClassFeature('캘린더는')
        : '캘린더를 불러올 수 없습니다';
      document.getElementById('calendarView').innerHTML = `<div class="empty">${message}</div>`;
    }
  }

  function renderCalendar(){
    const container = document.getElementById('calendarView');
    if (calendarEvents.length === 0) {
      container.innerHTML = '<div class="empty">아직 등록된 일정이 없습니다</div>';
      return;
    }

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const currentMonthStart = new Date(today.getFullYear(), today.getMonth(), 1);

    // Group upcoming events by month (exclude past months)
    const grouped = {};
    calendarEvents.forEach(event => {
      const dateObj = new Date(event.date);
      if (Number.isNaN(dateObj.getTime()) || dateObj < currentMonthStart) {
        return;
      }
      const monthKey = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}`;
      if (!grouped[monthKey]) grouped[monthKey] = [];
      grouped[monthKey].push({...event, dateObj});
    });

    const monthKeys = Object.keys(grouped).sort();
    if (monthKeys.length === 0) {
      container.innerHTML = '<div class="empty">다가오는 일정이 없습니다</div>';
      return;
    }

    const dayNames = ['일','월','화','수','목','금','토'];
    let html = '';
    monthKeys.forEach(monthKey => {
      const [year, month] = monthKey.split('-');
      html += `<div style="margin-bottom:20px;">`;
      html += `<h3 style="font-size:16px; margin:0 0 10px; color:var(--primary);">${year}년 ${parseInt(month, 10)}월</h3>`;
      html += `<div class="calendar-grid">`;

      grouped[monthKey]
        .sort((a, b) => a.dateObj - b.dateObj)
        .forEach(event => {
          const dateStr = `${event.dateObj.getMonth()+1}/${event.dateObj.getDate()} (${dayNames[event.dateObj.getDay()]})`;
          const isPast = event.dateObj < today;

          html += `<div class="calendar-event${isPast ? ' past' : ''}" data-event-id="${event.id}">`;
          html += `<div class="event-date">${dateStr}</div>`;
          html += `<div class="event-title">${escapeHtml(event.title)}</div>`;
          if (event.description) {
            html += `<div class="event-description">${escapeHtml(event.description)}</div>`;
          }
          html += `<div class="event-actions">`;
          html += `<button class="event-btn ghost" onclick="editEvent(${event.id})">수정</button>`;
          html += `<button class="event-btn ghost" onclick="deleteEvent(${event.id})">삭제</button>`;
          html += `</div>`;
          html += `</div>`;
        });

      html += `</div></div>`;
    });

    container.innerHTML = html;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  window.editEvent = async function(eventId) {
    const event = calendarEvents.find(e => e.id === eventId);
    if (!event) return;

    const title = prompt('일정 제목:', event.title);
    if (title === null) return;
    if (!title.trim()) {
      alert('제목을 입력해주세요');
      return;
    }

    const description = prompt('일정 설명 (선택):', event.description || '');
    const dateStr = prompt('날짜 (YYYY-MM-DD):', event.date);
    if (!dateStr) return;

    try {
      await fetchJson(`/api/classes/calendar/events/${eventId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          title: title.trim(),
          description: description ? description.trim() : '',
          date: dateStr
        })
      });
      await loadCalendarEvents();
    } catch(e) {
      console.error('Failed to update event:', e);
      alert(e?.status === 403 ? '이 일정을 수정할 권한이 없습니다.' : '일정 수정에 실패했습니다');
    }
  };

  window.deleteEvent = async function(eventId) {
    if (!confirm('이 일정을 삭제하시겠습니까?')) return;

    try {
      await fetchJson(`/api/classes/calendar/events/${eventId}`, {
        method: 'DELETE'
      });
      await loadCalendarEvents();
    } catch(e) {
      console.error('Failed to delete event:', e);
      alert(e?.status === 403 ? '이 일정을 삭제할 권한이 없습니다.' : '일정 삭제에 실패했습니다');
    }
  };

  document.getElementById('addEventBtn').addEventListener('click', async () => {
    const title = prompt('일정 제목:');
    if (!title || !title.trim()) return;

    const description = prompt('일정 설명 (선택):');
    const dateStr = prompt('날짜 (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
    if (!dateStr) return;

    const g = gradeSel.value, c = classSel.value;
    try {
      await fetchJson(`/api/classes/calendar/events?grade=${g}&section=${c}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          title: title.trim(),
          description: description ? description.trim() : '',
          date: dateStr
        })
      });
      await loadCalendarEvents();
    } catch(e) {
      console.error('Failed to create event:', e);
      alert(e?.status === 403 ? '이 반에는 일정을 추가할 수 없습니다.' : '일정 추가에 실패했습니다');
    }
  });

  // -------- Countdown Timer --------
  let countdownInterval = null;

  function parseSavedHomeTime(raw){
    if (!raw && raw !== 0){
      return null;
    }
    if (typeof raw === 'number'){
      const byNumber = new Date(raw);
      return Number.isNaN(byNumber.getTime()) ? null : byNumber;
    }
    const parsed = new Date(String(raw));
    return Number.isNaN(parsed.getTime()) ? null : parsed;
  }

  function formatDateInputValue(date){
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function formatTimeInputValue(date){
    const h = String(date.getHours()).padStart(2, '0');
    const m = String(date.getMinutes()).padStart(2, '0');
    return `${h}:${m}`;
  }

  function formatRemaining(diffMs){
    const total = Math.max(0, diffMs);
    const days = Math.floor(total / (1000 * 60 * 60 * 24));
    const hours = Math.floor((total % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((total % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((total % (1000 * 60)) / 1000);

    if (days > 0) return `${days}일 ${hours}시간 ${minutes}분 ${seconds}초`;
    if (hours > 0) return `${hours}시간 ${minutes}분 ${seconds}초`;
    if (minutes > 0) return `${minutes}분 ${seconds}초`;
    return `${seconds}초`;
  }

  function updateCountdown() {
    const targetDate = parseSavedHomeTime(loadData('homeTime'));
    if (!targetDate) {
      document.getElementById('countdownDisplay').textContent = '귀가 시간을 설정해주세요';
      document.getElementById('countdownMessage').textContent = '';
      return;
    }

    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
      document.getElementById('countdownDisplay').textContent = '🎉 집에 가는 시간입니다!';
      document.getElementById('countdownMessage').textContent = '안전하게 귀가하세요';
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
      return;
    }

    document.getElementById('countdownDisplay').textContent = formatRemaining(diff);

    const dateStr = targetDate.toLocaleDateString('ko-KR', {
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      weekday: 'short'
    });
    const timeStr = targetDate.toLocaleTimeString('ko-KR', {
      hour: '2-digit',
      minute: '2-digit'
    });
    document.getElementById('countdownMessage').textContent = `목표: ${dateStr} ${timeStr}`;
  }

  function startCountdown() {
    if (countdownInterval) {
      clearInterval(countdownInterval);
    }
    updateCountdown();
    countdownInterval = setInterval(updateCountdown, 1000);
  }

  document.getElementById('setHomeTimeBtn').addEventListener('click', () => {
    const dateInput = document.getElementById('homeDateInput');
    const timeInput = document.getElementById('homeTimeOnlyInput');
    const dateValue = dateInput.value;
    const timeValue = timeInput.value;

    if (!dateValue || !timeValue) {
      alert('날짜와 시간을 모두 입력해주세요');
      return;
    }

    const targetDate = new Date(`${dateValue}T${timeValue}:00`);
    const now = new Date();

    if (targetDate <= now) {
      alert('미래의 날짜와 시간을 입력해주세요');
      return;
    }

    saveData('homeTime', targetDate.toISOString());
    startCountdown();
  });

  document.getElementById('clearHomeTimeBtn').addEventListener('click', () => {
    if (confirm('귀가 시간 설정을 초기화하시겠습니까?')) {
      saveData('homeTime', null);
      document.getElementById('homeDateInput').value = '';
      document.getElementById('homeTimeOnlyInput').value = '';
      document.getElementById('countdownDisplay').textContent = '귀가 시간을 설정해주세요';
      document.getElementById('countdownMessage').textContent = '';
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
    }
  });

  // Load saved countdown time on page load
  function initCountdown() {
    const savedTime = parseSavedHomeTime(loadData('homeTime'));
    if (savedTime) {
      document.getElementById('homeDateInput').value = formatDateInputValue(savedTime);
      document.getElementById('homeTimeOnlyInput').value = formatTimeInputValue(savedTime);
      startCountdown();
    }
  }

  // -------- Load all data --------
  async function loadAllSchoollifeData() {
    // Load all data in parallel for better performance
    await Promise.all([
      loadTodayAll(),
      loadMealVoteStats(),
      loadCalendarEvents(),
      loadLatestNotice()
    ]);
  }

  async function bootstrapSchoollifePage() {
    await hydrateClassSelection();
    await loadAllSchoollifeData();
    initCountdown();
    if (getNoticeQueryView() === 'notices') {
      openNoticeModal();
    }
    setInterval(() => loadLatestNotice(), 10000);
  }

  bootstrapSchoollifePage();
</script>
