<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f7f3ea" />
  <meta name="application-name" content="DIMI Check" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <script>
    (function () {
      try {
        const raw = localStorage.getItem('dimicheck:settings');
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed.theme === 'light' || parsed.theme === 'dark') {
          document.documentElement.dataset.theme = parsed.theme;
        }
      } catch (e) {
        console.warn('[Theme] preload failed', e);
      }
    })();
  </script>
  <script defer src="/js/pwa.js"></script>
  <script defer src="/js/preferences.js"></script>
  <script defer src="/js/auth-guard.js"></script>
  <script defer src="/js/shop.js"></script>
  <title>상점 - DIMI Check</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" sizes="180x180" href="src/favicon/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="src/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="src/favicon/favicon-16x16.png" />
  <style>
    :root {
      --bg: #f7f3ea;
      --bg-2: #f0e5d0;
      --ink: #201a12;
      --muted: #766b5d;
      --card: rgba(255, 252, 246, 0.88);
      --card-strong: rgba(255, 255, 255, 0.96);
      --line: rgba(70, 52, 31, 0.12);
      --coin: #d99512;
      --accent: #2f6f73;
      --accent-2: #f36d3d;
      --shadow: 0 22px 60px rgba(71, 49, 24, 0.16);
      --radius: 28px;
      --safe-bottom: 0px;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    :root[data-theme='dark'] {
      --bg: #111820;
      --bg-2: #1d2833;
      --ink: #f5f0e8;
      --muted: #b6aa9a;
      --card: rgba(29, 39, 49, 0.82);
      --card-strong: rgba(36, 48, 60, 0.96);
      --line: rgba(255, 255, 255, 0.12);
      --coin: #ffd15a;
      --accent: #72d5c9;
      --accent-2: #ff8f66;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 10%, rgba(255, 211, 111, 0.46), transparent 28%),
        radial-gradient(circle at 88% 4%, rgba(77, 178, 171, 0.36), transparent 30%),
        linear-gradient(145deg, var(--bg), var(--bg-2));
      padding: 24px 18px calc(96px + env(safe-area-inset-bottom));
    }

    main {
      width: min(1080px, 100%);
      margin: 0 auto;
    }

    .shop-hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 34px;
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.28)),
        var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(140%);
    }

    .shop-hero::after {
      content: '';
      position: absolute;
      right: -90px;
      top: -110px;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      background: conic-gradient(from 120deg, rgba(255, 208, 79, 0.7), rgba(65, 179, 171, 0.64), rgba(247, 107, 65, 0.68), rgba(255, 208, 79, 0.7));
      opacity: 0.72;
      filter: blur(1px);
      animation: spinOrb 12s linear infinite;
    }

    .hero-row {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      font-weight: 800;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 8vw, 64px);
      letter-spacing: -0.08em;
      line-height: 0.95;
    }

    .hero-copy {
      margin: 14px 0 0;
      max-width: 520px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.58;
      font-weight: 600;
    }

    .wallet-card {
      min-width: min(280px, 100%);
      border-radius: 26px;
      padding: 18px;
      background: var(--card-strong);
      border: 1px solid var(--line);
      box-shadow: 0 14px 34px rgba(61, 42, 21, 0.12);
    }

    .wallet-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .wallet-balance {
      margin-top: 10px;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--coin);
    }

    .wallet-sub {
      margin-top: 6px;
      color: var(--muted);
      font-weight: 700;
    }

    .equipped-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0 22px;
    }

    .equipped-card {
      padding: 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--line);
    }

    .equipped-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .equipped-card strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin: 24px 0 18px;
      padding-bottom: 4px;
    }

    .tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 15px;
      background: rgba(255, 255, 255, 0.54);
      color: var(--muted);
      font: inherit;
      font-weight: 900;
      white-space: nowrap;
      cursor: pointer;
    }

    .tab.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), #193f44);
      box-shadow: 0 14px 28px rgba(47, 111, 115, 0.24);
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .item-card {
      position: relative;
      overflow: hidden;
      min-height: 310px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: 0 16px 42px rgba(71, 49, 24, 0.11);
      backdrop-filter: blur(14px) saturate(135%);
      animation: cardIn 0.38s ease both;
    }

    .preview {
      position: relative;
      height: 138px;
      margin: 14px;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(32, 26, 18, 0.08), rgba(32, 26, 18, 0.02));
      border: 1px solid var(--line);
    }

    .preview::before,
    .preview::after {
      content: '';
      position: absolute;
      inset: 50% auto auto 50%;
      width: 54px;
      height: 54px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: linear-gradient(145deg, #ff6d4a, #ffd050);
      box-shadow: 0 14px 34px rgba(243, 109, 61, 0.35), inset 0 4px 10px rgba(255, 255, 255, 0.32);
    }

    .preview::after {
      width: 92px;
      height: 92px;
      background: none;
      border: 2px solid rgba(255, 204, 80, 0.68);
      box-shadow: none;
      animation: pulseRing 1.6s ease-in-out infinite;
    }

    .preview[data-preview='swirl'] { background: radial-gradient(circle at 50% 50%, rgba(57, 154, 210, 0.3), rgba(255, 255, 255, 0.1)); }
    .preview[data-preview='swirl']::after { border-radius: 42% 58% 48% 52%; border-color: rgba(53, 155, 232, 0.8); animation: spinOrb 2.1s linear infinite; }
    .preview[data-preview='trail']::after,
    .preview[data-preview='fire']::after,
    .preview[data-preview='neon']::after {
      width: 150px;
      height: 12px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 208, 79, 0.78), transparent);
      animation: trailSweep 1.8s ease-in-out infinite;
    }
    .preview[data-preview='fire']::after { background: linear-gradient(90deg, transparent, rgba(255, 78, 36, 0.82), rgba(255, 210, 82, 0.9), transparent); }
    .preview[data-preview='neon']::after { background: linear-gradient(90deg, transparent, rgba(80, 236, 255, 0.86), rgba(255, 92, 252, 0.86), transparent); }
    .preview[data-preview='glow']::after { border-color: rgba(90, 240, 201, 0.75); box-shadow: 0 0 36px rgba(90, 240, 201, 0.42); }

    .item-body {
      padding: 0 18px 18px;
      display: flex;
      flex: 1;
      flex-direction: column;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .item-name {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.04em;
    }

    .rarity {
      border-radius: 999px;
      padding: 5px 9px;
      color: #fff;
      background: #71695f;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .rarity[data-rarity='rare'] { background: #2f6f73; }
    .rarity[data-rarity='epic'] { background: #7c4bc2; }

    .item-desc {
      margin: 10px 0 14px;
      min-height: 44px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
      font-weight: 600;
    }

    .item-actions {
      margin-top: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .price {
      flex: 1;
      color: var(--coin);
      font-size: 17px;
      font-weight: 900;
    }

    .action-btn {
      border: 0;
      border-radius: 16px;
      padding: 11px 14px;
      background: var(--ink);
      color: var(--bg);
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.14s ease, opacity 0.14s ease;
    }

    .action-btn:hover { transform: translateY(-1px); }
    .action-btn:disabled { cursor: default; opacity: 0.48; transform: none; }
    .action-btn.secondary { color: var(--ink); background: rgba(32, 26, 18, 0.08); }
    .action-btn.equipped { color: #fff; background: linear-gradient(135deg, var(--accent), #1f4e51); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(22px + env(safe-area-inset-bottom));
      z-index: 1000;
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      color: #fff;
      background: rgba(24, 20, 16, 0.9);
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 800;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.24);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .bottom-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      height: 68px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 900;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 18px 42px rgba(24, 20, 16, 0.16);
      backdrop-filter: blur(18px) saturate(140%);
    }

    :root[data-theme='dark'] .bottom-nav {
      background: rgba(22, 30, 39, 0.86);
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 800;
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
    }

    .nav-item.active { color: var(--accent); }

    .empty-state {
      grid-column: 1 / -1;
      padding: 32px;
      border-radius: 24px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--line);
      text-align: center;
      font-weight: 800;
    }

    @keyframes spinOrb {
      to { transform: rotate(360deg); }
    }

    @keyframes pulseRing {
      0%, 100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.68; }
      50% { transform: translate(-50%, -50%) scale(1.14); opacity: 0.22; }
    }

    @keyframes trailSweep {
      0%, 100% { transform: translate(-72%, -50%); opacity: 0.35; }
      50% { transform: translate(-28%, -50%); opacity: 0.9; }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 820px) {
      body { padding: 16px 12px calc(96px + env(safe-area-inset-bottom)); }
      .hero-row { flex-direction: column; }
      .wallet-card { width: 100%; }
      .equipped-strip { grid-template-columns: 1fr; }
      .shop-grid { grid-template-columns: 1fr; }
      .shop-hero { padding: 22px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="shop-hero">
      <a class="back-link" href="/my.html">← 마이 페이지</a>
      <div class="hero-row">
        <div>
          <h1>상점</h1>
          <p class="hero-copy">전자칠판에서 보이는 이동 효과와 드래그 궤적을 고릅니다. 상태 이동 자체는 그대로 두고, 표현만 가볍게 바뀝니다.</p>
        </div>
        <aside class="wallet-card" aria-live="polite">
          <div class="wallet-label">Wallet</div>
          <div class="wallet-balance" id="walletCoins">0 코인</div>
          <div class="wallet-sub" id="walletLevel">Lv. 1 · 0 XP</div>
        </aside>
      </div>

      <div class="equipped-strip" id="equippedStrip"></div>
    </section>

    <div class="tabs" role="tablist" aria-label="상점 카테고리">
      <button class="tab active" type="button" data-tab="move_effect">이동 이펙트</button>
      <button class="tab" type="button" data-tab="drag_effect">드래그 이펙트</button>
      <button class="tab" type="button" data-tab="aura_effect">오라</button>
    </div>

    <section class="shop-grid" id="shopGrid" aria-live="polite"></section>
  </main>

  <nav class="bottom-nav" aria-label="하단 내비게이션">
    <a href="/schoollife.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 1 9l4 2.18v6.32L12 21l7-3.5V11.18L23 9 12 3zm0 2.69L17.53 9 12 11.31 6.47 9 12 5.69zM18 17.18l-5 2.5v-5.81l5-2.5v5.81z"/></svg>
      <span>학교생활</span>
    </a>
    <a href="/routine.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2a1 1 0 0 1 1 1v1h8V3a1 1 0 1 1 2 0v1h1a3 3 0 0 1 3 3v11a3 3 0 0 1-3 3H4a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h1V3a1 1 0 0 1 1-1Zm13 8H4v9a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-9ZM6 7h12V6H6v1Z"/></svg>
      <span>루틴</span>
    </a>
    <a href="/user.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/></svg>
      <span>홈</span>
    </a>
    <a href="/chat.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
      <span>채팅</span>
    </a>
    <a href="/my.html" class="nav-item active" aria-current="page">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/></svg>
      <span>마이</span>
    </a>
  </nav>

  <div class="toast" id="shopToast" role="status" aria-live="polite"></div>
</body>
</html>
