<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f7f3ea" />
  <meta name="application-name" content="DIMI Check" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <script>
    (function () {
      try {
        const raw = localStorage.getItem('dimicheck:settings');
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed.theme === 'light' || parsed.theme === 'dark') {
          document.documentElement.dataset.theme = parsed.theme;
        }
      } catch (e) {
        console.warn('[Theme] preload failed', e);
      }
    })();
  </script>
  <script defer src="/js/pwa.js"></script>
  <script defer src="/js/preferences.js"></script>
  <script defer src="/js/auth-guard.js"></script>
  <script defer src="/js/shop.js"></script>
  <title>상점 - DIMI Check</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" sizes="180x180" href="src/favicon/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="src/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="src/favicon/favicon-16x16.png" />
  <style>
    :root {
      --bg: #f7f3ea;
      --bg-2: #f0e5d0;
      --ink: #201a12;
      --muted: #766b5d;
      --card: rgba(255, 252, 246, 0.88);
      --card-strong: rgba(255, 255, 255, 0.96);
      --line: rgba(70, 52, 31, 0.12);
      --coin: #d99512;
      --accent: #2f6f73;
      --accent-2: #f36d3d;
      --shadow: 0 22px 60px rgba(71, 49, 24, 0.16);
      --radius: 28px;
      --safe-bottom: 0px;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    :root[data-theme='dark'] {
      --bg: #111820;
      --bg-2: #1d2833;
      --ink: #f5f0e8;
      --muted: #b6aa9a;
      --card: rgba(29, 39, 49, 0.82);
      --card-strong: rgba(36, 48, 60, 0.96);
      --line: rgba(255, 255, 255, 0.12);
      --coin: #ffd15a;
      --accent: #72d5c9;
      --accent-2: #ff8f66;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        radial-gradient(circle at 14% 10%, rgba(255, 211, 111, 0.46), transparent 28%),
        radial-gradient(circle at 88% 4%, rgba(77, 178, 171, 0.36), transparent 30%),
        linear-gradient(145deg, var(--bg), var(--bg-2));
      background-size: 34px 34px, 34px 34px, auto, auto, auto;
      padding: 24px 18px calc(96px + env(safe-area-inset-bottom));
    }

    main {
      width: min(1080px, 100%);
      margin: 0 auto;
    }

    .shop-hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 34px;
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.28)),
        var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(140%);
    }

    .shop-hero::after {
      content: '';
      position: absolute;
      right: -90px;
      top: -110px;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      background: conic-gradient(from 120deg, rgba(255, 208, 79, 0.7), rgba(65, 179, 171, 0.64), rgba(247, 107, 65, 0.68), rgba(255, 208, 79, 0.7));
      opacity: 0.72;
      filter: blur(1px);
      animation: spinOrb 12s linear infinite;
    }

    .shop-hero::before {
      content: '';
      position: absolute;
      inset: auto 24px 20px auto;
      width: 170px;
      height: 52px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(47, 111, 115, 0.18), rgba(255, 209, 90, 0.24), rgba(243, 109, 61, 0.18));
      filter: blur(16px);
      opacity: 0.9;
      pointer-events: none;
    }

    .hero-row {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      font-weight: 800;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 8vw, 64px);
      letter-spacing: -0.08em;
      line-height: 0.95;
    }

    .hero-copy {
      margin: 14px 0 0;
      max-width: 520px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.58;
      font-weight: 600;
    }

    .hero-actions-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .hero-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      color: #fff;
      text-decoration: none;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), #193f44);
      box-shadow: 0 14px 28px rgba(47, 111, 115, 0.24);
    }

    .hero-link.secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .wallet-card {
      min-width: min(280px, 100%);
      border-radius: 26px;
      padding: 18px;
      background: var(--card-strong);
      border: 1px solid var(--line);
      box-shadow: 0 14px 34px rgba(61, 42, 21, 0.12);
    }

    .wallet-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .wallet-balance {
      margin-top: 10px;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--coin);
    }

    .wallet-sub {
      margin-top: 6px;
      color: var(--muted);
      font-weight: 700;
    }

    .equipped-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0 22px;
    }

    .equipped-card {
      padding: 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--line);
    }

    .equipped-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .equipped-card strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin: 24px 0 18px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      backdrop-filter: blur(16px);
    }

    .tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 11px 15px;
      background: rgba(255, 255, 255, 0.54);
      color: var(--muted);
      font: inherit;
      font-weight: 900;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
    }

    .tab:hover {
      transform: translateY(-1px);
    }

    .tab.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), #193f44);
      box-shadow: 0 14px 28px rgba(47, 111, 115, 0.24);
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .item-card {
      position: relative;
      overflow: hidden;
      min-height: 310px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: 0 16px 42px rgba(71, 49, 24, 0.11);
      backdrop-filter: blur(14px) saturate(135%);
      animation: cardIn 0.38s ease both;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .item-card:hover {
      transform: translateY(-4px);
      border-color: color-mix(in oklab, var(--accent) 34%, var(--line));
      box-shadow: 0 22px 56px rgba(71, 49, 24, 0.17);
    }

    .preview {
      position: relative;
      height: 138px;
      margin: 14px;
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.88), transparent 16%),
        linear-gradient(135deg, rgba(32, 26, 18, 0.1), rgba(32, 26, 18, 0.02));
      border: 1px solid var(--line);
    }

    .preview span {
      position: absolute;
      pointer-events: none;
    }

    .preview-magnet,
    .preview-ghost {
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(145deg, #ff6d4a, #ffd050);
      box-shadow: 0 14px 34px rgba(243, 109, 61, 0.35), inset 0 4px 10px rgba(255, 255, 255, 0.32);
      z-index: 3;
    }

    .preview-ring {
      left: 50%;
      top: 50%;
      width: 122px;
      height: 122px;
      border-radius: 999px;
      border: 4px solid rgba(255, 204, 80, 0.74);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 34px rgba(255, 204, 80, 0.36), inset 0 0 18px rgba(255, 255, 255, 0.28);
      animation: previewShockwave 1.65s ease-in-out infinite;
      z-index: 1;
    }

    .preview-ring--two {
      width: 88px;
      height: 88px;
      opacity: 0.7;
      animation-delay: -0.7s;
    }

    .preview-trail {
      left: 12%;
      top: 58%;
      width: 160px;
      height: 22px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 231, 139, 0.92), rgba(255, 255, 255, 0.96), transparent);
      box-shadow: 0 0 28px rgba(255, 231, 139, 0.46);
      animation: previewTrailSweep 1.35s ease-in-out infinite;
      z-index: 2;
    }

    .preview-trail--two {
      top: 43%;
      animation-delay: -0.58s;
      opacity: 0.62;
    }

    .preview-ghost {
      opacity: 0;
      z-index: 2;
      animation: previewGhost 1.45s ease-out infinite;
    }

    .preview-ghost--two {
      animation-delay: -0.62s;
    }

    .preview-bolt {
      left: 54%;
      top: 14%;
      z-index: 4;
      color: #fff7a8;
      font-size: 62px;
      text-shadow: 0 0 18px #fff, 0 0 34px rgba(255, 207, 68, 0.9);
      transform: translate(-50%, 0);
      opacity: 0;
      animation: previewBolt 1.5s steps(2, end) infinite;
    }

    .preview-pop {
      left: 50%;
      top: 50%;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: radial-gradient(circle, #fff 0 12%, #ffe063 13% 42%, #ff431d 43% 72%, transparent 73%);
      box-shadow: 0 0 24px rgba(255, 71, 28, 0.72);
      transform: translate(-50%, -50%);
      animation: previewFirePop 1.2s ease-out infinite;
      z-index: 1;
    }

    .preview-pop--one {
      left: 34%;
      top: 62%;
    }

    .preview-pop--two {
      left: 67%;
      top: 37%;
      animation-delay: -0.48s;
    }

    .preview[data-preview='spark'] .preview-bolt,
    .preview[data-preview='spark'] .preview-ghost,
    .preview[data-preview='spark'] .preview-pop,
    .preview[data-preview='spark'] .preview-trail {
      display: none;
    }

    .preview[data-preview='starburst'] {
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 216, 93, 0.5), transparent 34%),
        linear-gradient(135deg, rgba(255, 111, 71, 0.16), rgba(255, 255, 255, 0.08));
    }

    .preview[data-preview='starburst'] .preview-bolt {
      opacity: 1;
    }

    .preview[data-preview='starburst'] .preview-trail,
    .preview[data-preview='starburst'] .preview-ghost {
      display: none;
    }

    .preview[data-preview='supernova'] {
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.82), transparent 13%),
        radial-gradient(circle at 50% 50%, rgba(255, 229, 123, 0.48), transparent 32%),
        radial-gradient(circle at 54% 48%, rgba(96, 207, 255, 0.32), transparent 50%),
        linear-gradient(135deg, rgba(255, 117, 75, 0.16), rgba(71, 101, 255, 0.13));
    }

    .preview[data-preview='supernova'] .preview-ring {
      width: 168px;
      height: 168px;
      border: 4px solid rgba(255, 244, 174, 0.86);
      box-shadow: 0 0 46px rgba(255, 235, 126, 0.64), 0 0 72px rgba(94, 211, 255, 0.32), inset 0 0 28px rgba(255, 255, 255, 0.42);
      animation: previewSupernovaRing 1.28s cubic-bezier(0.08, 0.82, 0.18, 1) infinite;
    }

    .preview[data-preview='supernova'] .preview-ring--two {
      width: 104px;
      height: 104px;
      border-color: rgba(110, 218, 255, 0.82);
      animation-delay: -0.34s;
    }

    .preview[data-preview='supernova'] .preview-magnet {
      color: #221a11;
      background: radial-gradient(circle at 50% 44%, #fff 0 22%, #fff4ab 23% 52%, #65d6ff 53% 76%, #ff7c51 77% 100%);
      box-shadow: 0 0 42px rgba(255, 255, 255, 0.82), 0 0 72px rgba(255, 230, 121, 0.54);
      animation: previewSupernovaCore 1.28s cubic-bezier(0.08, 0.82, 0.18, 1) infinite;
    }

    .preview[data-preview='supernova'] .preview-bolt {
      display: block;
      opacity: 1;
      color: #fff5a8;
      transform-origin: center 70%;
      animation: previewSupernovaRay 1.28s steps(2, end) infinite;
    }

    .preview[data-preview='supernova'] .preview-pop {
      display: block;
      background: radial-gradient(circle, #fff 0 20%, #fff3a6 21% 48%, #6fdcff 49% 72%, transparent 74%);
      box-shadow: 0 0 28px rgba(255, 241, 156, 0.8), 0 0 48px rgba(92, 211, 255, 0.46);
      animation: previewSupernovaPop 1.28s ease-out infinite;
    }

    .preview[data-preview='supernova'] .preview-pop--one {
      left: 31%;
      top: 61%;
    }

    .preview[data-preview='supernova'] .preview-pop--two {
      left: 69%;
      top: 35%;
      animation-delay: -0.46s;
    }

    .preview[data-preview='supernova'] .preview-trail,
    .preview[data-preview='supernova'] .preview-ghost {
      display: none;
    }

    .preview[data-preview='wormhole'] {
      background:
        radial-gradient(circle at 50% 50%, rgba(54, 197, 255, 0.5), rgba(42, 65, 201, 0.2) 36%, rgba(255, 255, 255, 0.06));
    }

    .preview[data-preview='wormhole'] .preview-ring {
      border-color: rgba(77, 216, 255, 0.88);
      border-radius: 42% 58% 48% 52%;
      box-shadow: 0 0 42px rgba(77, 216, 255, 0.58), inset 0 0 24px rgba(255, 255, 255, 0.34);
      animation: previewWormhole 1.25s linear infinite;
    }

    .preview[data-preview='wormhole'] .preview-magnet {
      animation: previewMagnetWarp 1.25s ease-in-out infinite;
    }

    .preview[data-preview='wormhole'] .preview-bolt,
    .preview[data-preview='wormhole'] .preview-trail,
    .preview[data-preview='wormhole'] .preview-ghost,
    .preview[data-preview='wormhole'] .preview-pop {
      display: none;
    }

    .preview[data-preview='ribbon'] .preview-ring,
    .preview[data-preview='ribbon'] .preview-bolt,
    .preview[data-preview='ribbon'] .preview-pop {
      display: none;
    }

    .preview[data-preview='ribbon'] .preview-magnet {
      animation: previewMagnetRun 1.35s ease-in-out infinite;
    }

    .preview[data-preview='fire'] {
      background:
        radial-gradient(circle at 42% 56%, rgba(255, 111, 43, 0.5), transparent 38%),
        linear-gradient(135deg, rgba(255, 61, 24, 0.16), rgba(255, 235, 110, 0.08));
    }

    .preview[data-preview='fire'] .preview-ring,
    .preview[data-preview='fire'] .preview-bolt {
      display: none;
    }

    .preview[data-preview='fire'] .preview-trail {
      height: 30px;
      background: linear-gradient(90deg, transparent, rgba(255, 41, 18, 0.94), rgba(255, 210, 62, 1), rgba(255, 255, 255, 0.8), transparent);
      box-shadow: 0 0 34px rgba(255, 78, 36, 0.7), 0 0 62px rgba(255, 61, 24, 0.38);
    }

    .preview[data-preview='fire'] .preview-magnet {
      animation: previewMagnetRun 1.25s ease-in-out infinite;
    }

    .preview[data-preview='ghost'] {
      background:
        radial-gradient(circle at 52% 50%, rgba(80, 236, 255, 0.38), transparent 32%),
        linear-gradient(135deg, rgba(70, 220, 255, 0.16), rgba(255, 92, 252, 0.14));
    }

    .preview[data-preview='ghost'] .preview-ring,
    .preview[data-preview='ghost'] .preview-bolt,
    .preview[data-preview='ghost'] .preview-pop {
      display: none;
    }

    .preview[data-preview='ghost'] .preview-trail {
      height: 26px;
      background: linear-gradient(90deg, transparent, rgba(80, 236, 255, 0.94), rgba(255, 92, 252, 0.94), rgba(255, 255, 255, 0.86), transparent);
      box-shadow: 0 0 34px rgba(80, 236, 255, 0.72), 0 0 62px rgba(255, 92, 252, 0.44);
    }

    .preview[data-preview='ghost'] .preview-magnet {
      background: linear-gradient(145deg, #33dff7, #ff5cf2);
      animation: previewMagnetRun 1.2s ease-in-out infinite;
    }

    .preview[data-preview='ghost'] .preview-ghost {
      opacity: 0.7;
      color: #fff;
      background: rgba(74, 225, 255, 0.18);
      border: 2px solid rgba(255, 92, 252, 0.82);
      box-shadow: 0 0 32px rgba(80, 236, 255, 0.62), 0 0 54px rgba(255, 92, 252, 0.38);
    }

    .preview[data-preview='comet'] {
      background:
        radial-gradient(circle at 64% 48%, rgba(255, 255, 255, 0.82), transparent 13%),
        radial-gradient(circle at 48% 52%, rgba(89, 207, 255, 0.44), transparent 35%),
        linear-gradient(135deg, rgba(51, 92, 255, 0.18), rgba(217, 137, 255, 0.12));
    }

    .preview[data-preview='comet'] .preview-ring,
    .preview[data-preview='comet'] .preview-bolt,
    .preview[data-preview='comet'] .preview-ghost,
    .preview[data-preview='comet'] .preview-pop {
      display: none;
    }

    .preview[data-preview='comet'] .preview-magnet {
      background: linear-gradient(145deg, #ffffff, #72dcff 48%, #8f7cff);
      box-shadow: 0 0 40px rgba(108, 221, 255, 0.68), inset 0 4px 10px rgba(255, 255, 255, 0.5);
      animation: previewCometHead 1.55s ease-in-out infinite;
    }

    .preview[data-preview='comet'] .preview-trail {
      left: 0%;
      top: 50%;
      width: 210px;
      height: 38px;
      border-radius: 999px 40px 40px 999px;
      background:
        linear-gradient(90deg, transparent, rgba(123, 111, 255, 0.35), rgba(104, 218, 255, 0.82), rgba(255, 255, 255, 0.96));
      box-shadow: 0 0 34px rgba(104, 218, 255, 0.72), 0 0 68px rgba(143, 124, 255, 0.44);
      transform-origin: right center;
      animation: previewCometTail 1.55s ease-in-out infinite;
    }

    .preview[data-preview='comet'] .preview-trail--two {
      top: 58%;
      height: 18px;
      opacity: 0.48;
      animation-delay: -0.34s;
    }

    .preview[data-preview='aura'] .preview-trail,
    .preview[data-preview='aura'] .preview-bolt,
    .preview[data-preview='aura'] .preview-ghost,
    .preview[data-preview='aura'] .preview-pop {
      display: none;
    }

    .preview[data-preview='aura'] .preview-ring {
      border-color: rgba(90, 240, 201, 0.86);
      box-shadow: 0 0 44px rgba(90, 240, 201, 0.62), inset 0 0 24px rgba(255, 255, 255, 0.34);
    }

    .preview[data-preview='aura'] .preview-magnet {
      background: linear-gradient(145deg, #2f6f73, #78f0d4);
      box-shadow: 0 0 42px rgba(90, 240, 201, 0.56), inset 0 4px 10px rgba(255, 255, 255, 0.32);
    }

    .item-body {
      padding: 0 18px 18px;
      display: flex;
      flex: 1;
      flex-direction: column;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .item-name {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.04em;
    }

    .rarity {
      border-radius: 999px;
      padding: 5px 9px;
      color: #fff;
      background: #71695f;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .rarity[data-rarity='rare'] { background: #2f6f73; }
    .rarity[data-rarity='epic'] { background: #7c4bc2; }
    .rarity[data-rarity='legendary'] {
      background: linear-gradient(135deg, #ff9f1c, #ff3d77, #7857ff);
      box-shadow: 0 0 18px rgba(255, 121, 64, 0.35);
    }

    .item-desc {
      margin: 10px 0 14px;
      min-height: 44px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
      font-weight: 600;
    }

    .item-actions {
      margin-top: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .price {
      flex: 1;
      color: var(--coin);
      font-size: 17px;
      font-weight: 900;
    }

    .action-btn {
      border: 0;
      border-radius: 16px;
      padding: 11px 14px;
      background: linear-gradient(135deg, var(--ink), color-mix(in oklab, var(--ink) 70%, var(--accent) 30%));
      color: var(--bg);
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.14s ease, opacity 0.14s ease;
    }

    .action-btn:hover { transform: translateY(-1px); }
    .action-btn:disabled { cursor: default; opacity: 0.48; transform: none; }
    .action-btn.secondary { color: var(--ink); background: rgba(32, 26, 18, 0.08); }
    .action-btn.equipped { color: #fff; background: linear-gradient(135deg, var(--accent), #1f4e51); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(22px + env(safe-area-inset-bottom));
      z-index: 1000;
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      color: #fff;
      background: rgba(24, 20, 16, 0.9);
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 800;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.24);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .bottom-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      height: 68px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 900;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 18px 42px rgba(24, 20, 16, 0.16);
      backdrop-filter: blur(18px) saturate(140%);
    }

    :root[data-theme='dark'] .bottom-nav {
      background: rgba(22, 30, 39, 0.86);
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 800;
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
    }

    .nav-item.active { color: var(--accent); }

    .empty-state {
      grid-column: 1 / -1;
      padding: 32px;
      border-radius: 24px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--line);
      text-align: center;
      font-weight: 800;
    }

    @keyframes spinOrb {
      to { transform: rotate(360deg); }
    }

    @keyframes pulseRing {
      0%, 100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.68; }
      50% { transform: translate(-50%, -50%) scale(1.14); opacity: 0.22; }
    }

    @keyframes trailSweep {
      0%, 100% { transform: translate(-72%, -50%); opacity: 0.35; }
      50% { transform: translate(-28%, -50%); opacity: 0.9; }
    }

    @keyframes previewShockwave {
      0% { opacity: 0.94; transform: translate(-50%, -50%) scale(0.35); }
      70% { opacity: 0.35; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.28); }
    }

    @keyframes previewWormhole {
      0% { opacity: 0.95; transform: translate(-50%, -50%) rotate(0deg) scale(0.84); }
      50% { opacity: 0.72; transform: translate(-50%, -50%) rotate(210deg) scale(1.2); }
      100% { opacity: 0.95; transform: translate(-50%, -50%) rotate(420deg) scale(0.84); }
    }

    @keyframes previewSupernovaRing {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.28); filter: blur(0); }
      24% { opacity: 0.95; transform: translate(-50%, -50%) scale(0.86); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.28); filter: blur(5px); }
    }

    @keyframes previewSupernovaCore {
      0%, 100% { transform: translate(-50%, -50%) scale(0.92); filter: brightness(1); }
      22% { transform: translate(-50%, -50%) scale(1.28); filter: brightness(1.55); }
      46% { transform: translate(-50%, -50%) scale(1.05); filter: brightness(1.18); }
    }

    @keyframes previewSupernovaRay {
      0%, 46%, 100% { opacity: 0; transform: translate(-50%, 0) scaleY(0.38) rotate(-8deg); }
      12%, 28% { opacity: 1; transform: translate(-50%, 0) scaleY(1.24) rotate(8deg); }
    }

    @keyframes previewSupernovaPop {
      0% { opacity: 0.9; transform: translate(-50%, -50%) scale(0.32); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(3.2); filter: blur(5px); }
    }

    @keyframes previewMagnetWarp {
      0%, 100% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
      45% { transform: translate(-50%, -50%) scale(0.38) rotate(18deg); filter: brightness(1.5); }
      70% { transform: translate(-50%, -50%) scale(1.2) rotate(-8deg); }
    }

    @keyframes previewMagnetRun {
      0%, 100% { transform: translate(-58px, -50%) scale(0.96); }
      50% { transform: translate(10px, -50%) scale(1.08); }
    }

    @keyframes previewTrailSweep {
      0%, 100% { transform: translateX(-42px) scaleX(0.58); opacity: 0.2; filter: blur(2px); }
      50% { transform: translateX(38px) scaleX(1.08); opacity: 0.95; filter: blur(0); }
    }

    @keyframes previewGhost {
      0% { opacity: 0.64; transform: translate(-70px, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-116px, -50%) scale(1.38); filter: blur(5px); }
    }

    @keyframes previewBolt {
      0%, 52%, 100% { opacity: 0; transform: translate(-50%, 0) scaleY(0.4); }
      12%, 26% { opacity: 1; transform: translate(-50%, 0) scaleY(1.14); }
    }

    @keyframes previewFirePop {
      0% { opacity: 0.85; transform: translate(-50%, -50%) scale(0.4); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(3); filter: blur(5px); }
    }

    @keyframes previewCometHead {
      0%, 100% { transform: translate(-6px, -50%) scale(1); }
      50% { transform: translate(34px, -50%) scale(1.1); filter: brightness(1.2); }
    }

    @keyframes previewCometTail {
      0%, 100% { transform: translateX(-34px) scaleX(0.74); opacity: 0.45; filter: blur(4px); }
      50% { transform: translateX(10px) scaleX(1.12); opacity: 1; filter: blur(0); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 820px) {
      body { padding: 16px 12px calc(96px + env(safe-area-inset-bottom)); }
      .hero-row { flex-direction: column; }
      .wallet-card { width: 100%; }
      .equipped-strip { grid-template-columns: 1fr; }
      .shop-grid { grid-template-columns: 1fr; }
      .shop-hero { padding: 22px; }
    }
  </style>
</head>
