<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DimiCheck Arcade</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #090b12;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --muted: #aeb7c8;
      --red: #ff6b7a;
      --red-soft: rgba(255, 107, 122, 0.78);
      --blue: #5bbcff;
      --blue-soft: rgba(91, 188, 255, 0.78);
      --line: rgba(255, 255, 255, 0.14);
      --gold: #ffd166;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 107, 122, 0.22), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(91, 188, 255, 0.22), transparent 30%),
        linear-gradient(140deg, #070811 0%, #111827 52%, #090b12 100%);
      overflow: hidden;
    }

    .page {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 22px;
      height: 100vh;
      padding: 22px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(18px);
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 48px;
      height: 48px;
      border-radius: 15px;
    }

    h1, h2, p { margin: 0; }

    h1 {
      font-size: 34px;
      letter-spacing: -0.05em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .code-card {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.1);
    }

    .code {
      font-size: clamp(42px, 9vw, 78px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 0.05em;
      text-align: center;
      color: var(--gold);
      text-shadow: 0 10px 30px rgba(255, 209, 102, 0.22);
    }

    .qr-wrap {
      display: grid;
      place-items: center;
      min-height: 238px;
      border-radius: 22px;
      background: #fff;
      padding: 16px;
    }

    .qr-wrap img {
      width: min(240px, 100%);
      height: auto;
      display: block;
    }

    .join-link {
      overflow: hidden;
      color: #dbeafe;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      text-align: center;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button, .button-link {
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      color: var(--text);
      background: var(--panel-strong);
      font: inherit;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, opacity 0.18s ease;
    }

    button:hover, .button-link:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .primary { background: linear-gradient(135deg, #ff6b7a, #ffb86b); color: #17110d; }
    .danger { background: rgba(255, 255, 255, 0.1); color: #ffd4d9; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
    }

    .stat b {
      display: block;
      margin-top: 6px;
      font-size: 24px;
    }

    .stage {
      position: relative;
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 22px;
      overflow: hidden;
    }

    .stage-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 16px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 13px;
      background: rgba(255, 255, 255, 0.11);
      color: #e5e7eb;
      font-weight: 800;
    }

    .game-board {
      position: relative;
      flex: 1;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 30px;
      overflow: hidden;
      background:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px),
        rgba(3, 7, 18, 0.68);
      background-size: calc(100% / 28) calc(100% / 16), calc(100% / 28) calc(100% / 16), auto;
      aspect-ratio: 28 / 16;
      max-height: calc(100vh - 150px);
    }

    .cell-layer {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(28, 1fr);
      grid-template-rows: repeat(16, 1fr);
    }

    .cell.red { background: var(--red-soft); }
    .cell.blue { background: var(--blue-soft); }

    .player-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .player {
      position: absolute;
      display: grid;
      place-items: center;
      width: clamp(26px, 2.7vw, 42px);
      height: clamp(26px, 2.7vw, 42px);
      border: 3px solid rgba(255, 255, 255, 0.86);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.26);
      font-size: clamp(15px, 1.5vw, 22px);
      font-weight: 900;
    }

    .player.red { background: linear-gradient(135deg, #ff8793, #ff4f67); }
    .player.blue { background: linear-gradient(135deg, #82d7ff, #269eff); }

    .player span {
      position: absolute;
      top: -27px;
      left: 50%;
      max-width: 92px;
      transform: translateX(-50%);
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(8, 13, 24, 0.74);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .roster {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      max-height: 108px;
      overflow: auto;
    }

    .roster-chip {
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.09);
      color: #f8fafc;
      font-size: 13px;
      font-weight: 750;
    }

    .roster-chip.red { box-shadow: inset 4px 0 var(--red); }
    .roster-chip.blue { box-shadow: inset 4px 0 var(--blue); }

    .overlay-message {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: rgba(4, 7, 15, 0.5);
      backdrop-filter: blur(4px);
    }

    .overlay-message[hidden] { display: none; }

    .overlay-card {
      max-width: 560px;
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(12, 18, 32, 0.88);
    }

    .overlay-card h2 {
      margin-bottom: 12px;
      font-size: clamp(34px, 6vw, 72px);
      letter-spacing: -0.05em;
    }

    .error {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255, 107, 122, 0.14);
      color: #ffd4d9;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .page {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
      }
      .game-board {
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <main class="page" data-grade="{{ grade or '' }}" data-section="{{ section or '' }}" data-enabled="{{ '1' if arcade_enabled else '0' }}">
    <aside class="side panel">
      <div class="brand">
        <img src="/logo.png" alt="">
        <div>
          <h1>Arcade</h1>
          <p class="subtitle">QR로 들어와 팀을 나누고, 칸을 점령합니다.</p>
        </div>
      </div>

      <div id="hostError" class="error" hidden></div>

      <section class="code-card" id="joinCard" hidden>
        <div class="code" id="sessionCode">-----</div>
        <div class="qr-wrap">
          <img id="qrImage" alt="참여 QR 코드">
        </div>
        <div class="join-link" id="joinLink"></div>
      </section>

      <section class="stats">
        <div class="stat">딸기팀<b id="redScore">0</b></div>
        <div class="stat">소다팀<b id="blueScore">0</b></div>
        <div class="stat">참가자<b id="playerCount">0명</b></div>
        <div class="stat">남은 시간<b id="remainingTime">--</b></div>
      </section>

      <div class="actions">
        <button id="startButton" class="primary" disabled>바로 시작</button>
        <button id="endButton" class="danger" disabled>종료</button>
        <a id="boardLink" class="button-link" href="/">Board로 돌아가기</a>
      </div>

      <div class="roster" id="roster"></div>
    </aside>

    <section class="stage panel">
      <div class="stage-top">
        <div>
          <div class="status-pill" id="statusText">Arcade 준비 중</div>
          <p class="subtitle" id="phaseText">잠시만 기다려 주세요.</p>
        </div>
      </div>

      <div class="game-board" id="gameBoard">
        <div class="cell-layer" id="cellLayer"></div>
        <div class="player-layer" id="playerLayer"></div>
        <div class="overlay-message" id="stageOverlay">
          <div class="overlay-card">
            <h2 id="overlayTitle">준비 중</h2>
            <p class="subtitle" id="overlayText">세션을 만드는 중입니다.</p>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="/js/arcade-host.js?v={{ asset_version }}"></script>
</body>
</html>
