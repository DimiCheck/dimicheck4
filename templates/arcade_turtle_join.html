<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>거북이 경주 참여</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    :root {
      --ink: #213047;
      --muted: #6d7d95;
      --green: #6fd06f;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 8%, rgba(255, 206, 84, 0.5), transparent 28%),
        radial-gradient(circle at 86% 20%, rgba(124, 216, 255, 0.48), transparent 32%),
        linear-gradient(160deg, #fff8df 0%, #eafaff 58%, #f1ffe9 100%);
      touch-action: manipulation;
    }
    .shell { min-height: 100vh; padding: 18px; display: grid; align-items: center; }
    .panel {
      border: 4px solid #fff;
      border-radius: 34px;
      padding: 22px;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 18px 0 rgba(33,48,71,0.08);
    }
    .hidden { display: none !important; }
    h1, h2, p { margin: 0; }
    h1 { font-size: 34px; letter-spacing: -0.06em; }
    .muted { color: var(--muted); font-weight: 850; line-height: 1.45; }
    form { display: grid; gap: 12px; margin-top: 18px; }
    .skin-picker {
      display: grid;
      gap: 10px;
      margin: 6px 0 2px;
    }
    .skin-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .skin-option {
      position: relative;
      min-height: 94px;
      padding: 10px;
      border: 3px solid transparent;
      border-radius: 24px;
      background: #fff;
      color: var(--ink);
      box-shadow: inset 0 -6px 0 rgba(33,48,71,0.06), 0 8px 0 rgba(33,48,71,0.08);
    }
    .skin-option img {
      width: 68px;
      height: 68px;
      object-fit: contain;
      transition: transform 0.16s ease;
    }
    .skin-option.is-selected {
      border-color: #6fd06f;
      background: linear-gradient(180deg, #fff 0%, #ecffe7 100%);
    }
    .skin-option.is-selected img {
      transform: translateY(-4px) scale(1.08);
    }
    .skin-option.is-selected::after {
      content: "선택";
      position: absolute;
      left: 50%;
      bottom: 7px;
      transform: translateX(-50%);
      padding: 3px 8px;
      border-radius: 999px;
      background: #213047;
      color: #fff;
      font-size: 11px;
      font-weight: 950;
    }
    .skin-picker.is-locked { opacity: 0.62; pointer-events: none; }
    .role-picker {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .role-option {
      min-height: 78px;
      border: 3px solid transparent;
      background: #fff;
      color: var(--ink);
      box-shadow: inset 0 -6px 0 rgba(33,48,71,0.06), 0 8px 0 rgba(33,48,71,0.08);
    }
    .role-option.is-selected {
      border-color: #213047;
      background: linear-gradient(180deg, #fff 0%, #eef6ff 100%);
    }
    input {
      width: 100%;
      border: 0;
      border-radius: 20px;
      padding: 16px;
      background: #fff;
      box-shadow: inset 0 -5px 0 rgba(33,48,71,0.06);
      font-size: 18px;
      font-weight: 900;
    }
    button {
      border: 0;
      border-radius: 24px;
      padding: 16px;
      background: #213047;
      color: #fff;
      box-shadow: 0 8px 0 rgba(33,48,71,0.13);
      font-size: 18px;
      font-weight: 950;
    }
    .game { display: none; gap: 14px; }
    .game.active { display: grid; }
    .status-card {
      border-radius: 26px;
      padding: 16px;
      background: #fff;
      box-shadow: inset 0 -6px 0 rgba(33,48,71,0.06);
      text-align: center;
    }
    .big {
      font-size: 46px;
      font-weight: 950;
      letter-spacing: -0.08em;
    }
    .progress {
      height: 24px;
      border-radius: 999px;
      background: rgba(33,48,71,0.1);
      overflow: hidden;
    }
    .progress span {
      display: block;
      width: var(--progress, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #6fd06f, #ffe066);
      transition: width 0.12s ease-out;
    }
    .tap-button {
      min-height: 260px;
      border-radius: 42px;
      background:
        radial-gradient(circle at 35% 28%, rgba(255,255,255,0.75), transparent 22%),
        linear-gradient(135deg, #6fd06f, #ffe066);
      color: #17301b;
      font-size: 34px;
      touch-action: manipulation;
      transition: min-height 0.14s ease, width 0.14s ease, transform 0.14s ease, background 0.14s ease;
    }
    .tap-button img {
      width: 74px;
      height: 74px;
      object-fit: contain;
      vertical-align: middle;
      margin-right: 8px;
      filter: drop-shadow(0 7px 0 rgba(33,48,71,0.1));
    }
    .tap-button.is-shrunk {
      min-height: 92px;
      width: 42%;
      justify-self: center;
      border-radius: 30px;
      font-size: 22px;
      animation: turtle-dodge 0.38s cubic-bezier(.33,0,.2,1) infinite alternate;
    }
    .tap-button.is-shrunk img {
      width: 46px;
      height: 46px;
    }
    .tap-button.is-fake-reset {
      background:
        radial-gradient(circle at 38% 28%, rgba(255,255,255,0.35), transparent 20%),
        linear-gradient(135deg, #ff3b30, #bf1b12);
      color: #fff;
      box-shadow: 0 10px 0 rgba(160,30,24,0.24);
      animation: fake-reset-alarm 0.18s linear infinite alternate;
    }
    .fake-reset {
      display: none;
      border-radius: 30px;
      background: #ff3b30;
      color: #fff;
      box-shadow: 0 9px 0 rgba(160,30,24,0.22);
      font-size: 24px;
    }
    .fake-reset.is-active { display: block; }
    .sabotage-panel {
      display: none;
      gap: 12px;
    }
    .sabotage-panel.active { display: grid; }
    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .choice-grid button {
      min-height: 64px;
      background: #fff;
      color: var(--ink);
      box-shadow: inset 0 -6px 0 rgba(33,48,71,0.06), 0 8px 0 rgba(33,48,71,0.08);
    }
    .choice-grid button.is-selected {
      background: #213047;
      color: #fff;
    }
    .tap-button:disabled { opacity: 0.5; }
    .error { margin-top: 12px; padding: 12px; border-radius: 18px; background: #ffe1e8; color: #bf3751; font-weight: 850; }
    @keyframes turtle-dodge {
      0% { transform: translate(-38px, -6px) rotate(-5deg); }
      28% { transform: translate(42px, 14px) rotate(6deg); }
      58% { transform: translate(-16px, -18px) rotate(3deg); }
      100% { transform: translate(32px, 7px) rotate(-7deg); }
    }
    @keyframes fake-reset-alarm {
      from { transform: translateX(-2px) scale(0.99); }
      to { transform: translateX(2px) scale(1.01); }
    }
  </style>
</head>
<body>
  <main class="shell" data-code="{{ code }}" data-enabled="{{ '1' if arcade_enabled else '0' }}">
    <section class="panel" id="entryPanel">
      <h1>거북이 경주</h1>
      <p class="muted">닉네임을 넣고 들어간 뒤, 시작하면 버튼을 계속 누르세요.</p>
      <form id="joinForm">
        <input id="nicknameInput" maxlength="8" autocomplete="nickname" placeholder="닉네임">
        <div class="role-picker">
          <button class="role-option is-selected" type="button" data-turtle-role="player">플레이어<br><span class="muted">직접 경주</span></button>
          <button class="role-option" type="button" data-turtle-role="saboteur">훼방꾼<br><span class="muted">아이템 투표</span></button>
        </div>
        <div class="skin-picker" id="entrySkinPicker">
          <p class="muted">내 거북이</p>
          <div class="skin-options">
            <button class="skin-option" type="button" data-turtle-skin="turtle-01.png"><img src="/turtle-01.png" alt="거북이 1"></button>
            <button class="skin-option" type="button" data-turtle-skin="turtle-02.png"><img src="/turtle-02.png" alt="거북이 2"></button>
            <button class="skin-option" type="button" data-turtle-skin="turtle-03.png"><img src="/turtle-03.png" alt="거북이 3"></button>
          </div>
        </div>
        <button id="joinButton" type="submit">입장</button>
      </form>
      <div id="entryErrorBox" class="error" hidden></div>
    </section>
    <section class="game" id="gamePanel">
      <div class="status-card">
        <p class="muted" id="statusText">연결 중</p>
        <div class="big" id="remainingTime">--</div>
      </div>
      <div class="status-card">
        <p class="muted">내 거북이</p>
        <div class="big" id="myProgress">0%</div>
        <div class="progress"><span id="progressBar"></span></div>
      </div>
      <div class="status-card skin-picker" id="gameSkinPicker">
        <p class="muted">시작 전까지 바꿀 수 있어요.</p>
        <div class="skin-options">
          <button class="skin-option" type="button" data-turtle-skin="turtle-01.png"><img src="/turtle-01.png" alt="거북이 1"></button>
          <button class="skin-option" type="button" data-turtle-skin="turtle-02.png"><img src="/turtle-02.png" alt="거북이 2"></button>
          <button class="skin-option" type="button" data-turtle-skin="turtle-03.png"><img src="/turtle-03.png" alt="거북이 3"></button>
        </div>
      </div>
      <button id="tapButton" class="tap-button" type="button" disabled>대기</button>
      <button id="fakeResetButton" class="fake-reset" type="button" hidden>초기화</button>
      <div class="status-card sabotage-panel" id="sabotagePanel">
        <p class="muted" id="sabotageStatus">5초마다 훼방 아이템을 투표합니다.</p>
        <div class="choice-grid" id="sabotageTargets"></div>
        <div class="choice-grid" id="sabotageItems"></div>
      </div>
      <div class="status-card">
        <p class="muted" id="myRank">등수는 경주 후 표시됩니다.</p>
        <p class="muted" id="tapCount">0 taps</p>
      </div>
      <div id="errorBox" class="error" hidden></div>
    </section>
  </main>
  <script src="/js/arcade-turtle-join.js?v={{ asset_version }}"></script>
</body>
</html>
