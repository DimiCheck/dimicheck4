  <title>DimiCheck 교사 대시보드</title>
  <style>
    :root {
      --bg: #fff8f1;
      --bg-soft: rgba(255, 249, 242, 0.86);
      --surface: rgba(255, 255, 255, 0.72);
      --surface-strong: rgba(255, 255, 255, 0.9);
      --border: rgba(110, 83, 56, 0.12);
      --text: #3f3024;
      --muted: #7f6956;
      --accent: #db8753;
      --accent-soft: #f1c3a4;
      --rose: #e89e94;
      --sun: #f6cd7b;
      --sage: #7fa88b;
      --present: #4f8f70;
      --present-soft: #6d9ec9;
      --away: #c96b62;
      --shadow: 0 24px 60px rgba(153, 115, 76, 0.14);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Pretendard", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 214, 170, 0.75), transparent 26%),
        radial-gradient(circle at 82% 14%, rgba(249, 195, 176, 0.55), transparent 25%),
        radial-gradient(circle at 74% 72%, rgba(245, 214, 138, 0.42), transparent 28%),
        radial-gradient(circle at 18% 82%, rgba(230, 181, 165, 0.36), transparent 22%),
        linear-gradient(180deg, #fffaf5 0%, #fff4eb 48%, #fff8f2 100%);
      padding: 32px 24px 48px;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .ambient::before,
    .ambient::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(70px);
      opacity: 0.55;
      animation: float 18s ease-in-out infinite;
    }

    .ambient::before {
      width: 34rem;
      height: 34rem;
      background: rgba(255, 208, 164, 0.6);
      top: -8rem;
      left: -6rem;
    }

    .ambient::after {
      width: 28rem;
      height: 28rem;
      background: rgba(240, 182, 170, 0.44);
      right: -5rem;
      bottom: -8rem;
      animation-direction: reverse;
      animation-duration: 22s;
    }

    @keyframes float {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(0, -16px, 0) scale(1.04); }
    }

    .shell {
      width: 100%;
      max-width: none;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .page-layout {
      display: block;
    }

    .nav-sidebar {
      width: 196px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 24px 24px 0;
      box-shadow: var(--shadow);
      padding: 24px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 30;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      appearance: none;
      border: 1px solid transparent;
      border-radius: 18px;
      background: rgba(255,255,255,0.62);
      padding: 14px 16px;
      text-align: left;
      font: inherit;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      text-decoration: none;
      transition: background .18s ease, border-color .18s ease, color .18s ease, transform .18s ease;
    }

    .nav-item:hover {
      transform: translateY(-1px);
    }

    .nav-item.active {
      background: linear-gradient(135deg, #f4c8ae, #efdbb3 60%, #eeb38b);
      border-color: rgba(211, 133, 85, 0.24);
      color: #5b3a24;
      box-shadow: 0 10px 22px rgba(228, 160, 116, 0.18);
    }

    .nav-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      opacity: 0.88;
    }

    .nav-label {
      flex: 1;
    }

    .main-stage,
    .content-column {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    .main-stage,
    .search-header {
      margin-left: 190px;
      width: calc(100% - 190px);
      padding: 0 24px;
    }

    .content-column {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    .search-header {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      position: relative;
      z-index: 10;
    }

    .search-header-bar {
      width: min(760px, 100%);
      padding: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(124, 96, 69, 0.12);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .card,
    .hero-card,
    .search-card,
    .summary-card,
    .classes-section,
    .class-card,
    .notice-page,
    .modal-card,
    .onboarding-card {
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .hero-card,
    .search-card,
    .summary-card,
    .classes-section {
      border-radius: var(--radius-xl);
    }

    .hero-card {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .hero-title {
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .grade-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(124, 96, 69, 0.1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
    }

    .grade-btn,
    .ghost-btn,
    .solid-btn,
    .notice-send,
    .metric-tab,
    .status-btn,
    .btn-cancel,
    .jump-btn {
      appearance: none;
      border: none;
      font: inherit;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease, color .18s ease;
    }

    .grade-btn {
      border-radius: 999px;
      padding: 10px 16px;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
    }

    .grade-btn.active {
      background: linear-gradient(135deg, #f4c8ae, #efdbb3 60%, #eeb38b);
      color: #5b3a24;
      box-shadow: 0 10px 22px rgba(228, 160, 116, 0.28);
    }

    .grade-btn:hover,
    .ghost-btn:hover,
    .solid-btn:hover,
    .notice-send:hover,
    .metric-tab:hover,
    .status-btn:hover,
    .btn-cancel:hover,
    .jump-btn:hover {
      transform: translateY(-1px);
    }

    .ghost-btn {
      padding: 11px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(124, 96, 69, 0.12);
      color: var(--text);
      font-weight: 600;
    }

    .mobile-notice-btn,
    .drawer-close-btn {
      display: none;
    }

    .notice-layout {
      display: grid;
      grid-template-columns: minmax(0, 240px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .notice-panel-title h2,
    .section-heading h2,
    .classes-heading h2 {
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .notice-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .notice-page {
      border-radius: var(--radius-xl);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
    }

    .mobile-drawer-notice {
      display: none;
    }

    .notice-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .notice-page-header h2,
    .notice-history h3 {
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .notice-history {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .notice-history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .notice-history-item {
      border-radius: 18px;
      border: 1px solid rgba(124, 96, 69, 0.1);
      background: rgba(255,255,255,0.76);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .notice-history-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
    }

    .notice-history-text {
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .notice-history-target {
      font-size: 12px;
      color: var(--muted);
    }

    .notice-history-empty {
      border-radius: 18px;
      border: 1px dashed rgba(124, 96, 69, 0.18);
      background: rgba(255,255,255,0.56);
      color: var(--muted);
      padding: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .drawer-backdrop {
      display: none;
    }

    .notice-row,
    .search-field,
    .summary-stats,
    .search-result-header,
    .class-card-top,
    .modal-footer,
    .onboarding-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .notice-input,
    .notice-textarea,
    .search-input,
    .text-input,
    .input {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(124, 96, 69, 0.14);
      background: rgba(255, 255, 255, 0.76);
      color: var(--text);
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .notice-input:focus,
    .notice-textarea:focus,
    .search-input:focus,
    .text-input:focus,
    .input:focus {
      border-color: rgba(219, 135, 83, 0.55);
      box-shadow: 0 0 0 4px rgba(237, 187, 151, 0.28);
    }

    .notice-input {
      max-width: 220px;
    }

    .notice-textarea {
      min-height: 112px;
      resize: vertical;
      line-height: 1.55;
    }

    .notice-target-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(124, 96, 69, 0.1);
      color: var(--text);
      font-size: 14px;
    }

    .notice-target-toggle input,
    .target-chip input,
    .target-group-chip input {
      accent-color: var(--accent);
    }

    .notice-targets-wrap {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.52);
      border: 1px solid rgba(124, 96, 69, 0.08);
    }

    .notice-targets-wrap.visible {
      display: flex;
    }

    .target-group-row,
    .target-chip-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .target-chip,
    .target-group-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(124, 96, 69, 0.12);
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      font-size: 14px;
      transition: border-color .18s ease, background .18s ease, color .18s ease, box-shadow .18s ease;
    }

    .target-chip.active,
    .target-group-chip.active {
      color: #6a3e25;
      background: rgba(243, 202, 167, 0.62);
      border-color: rgba(211, 133, 85, 0.42);
      box-shadow: 0 10px 22px rgba(229, 172, 131, 0.18);
    }

    .notice-send,
    .solid-btn,
    .jump-btn {
      padding: 12px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #da8852, #f0c38c);
      color: #fffaf7;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(218, 136, 82, 0.24);
    }

    .notice-send[disabled] {
      opacity: 0.58;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .notice-feedback {
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
    }

    .search-card,
    .summary-card,
    .classes-section {
      padding: 24px 26px;
    }

    .search-header .search-input {
      border-radius: 999px;
      border: none;
      background: transparent;
      box-shadow: none;
      padding: 8px 14px;
      font-size: 16px;
    }

    .search-header .search-input:focus {
      border: none;
      box-shadow: none;
    }

    .section-heading-row,
    .classes-heading-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .search-result {
      width: min(760px, 100%);
      min-height: 106px;
      border-radius: 20px;
      border: 1px dashed rgba(124, 96, 69, 0.18);
      background: rgba(255,255,255,0.97);
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      backdrop-filter: none;
    }

    .search-result-overlay {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      box-shadow: 0 20px 44px rgba(120, 84, 53, 0.18);
      display: none;
    }

    .search-result-overlay.visible {
      display: flex;
    }

    .search-result[data-tone="present"] {
      border-style: solid;
      border-color: rgba(79, 143, 112, 0.24);
      background: rgb(240, 248, 242);
      color: #416a55;
    }

    .search-result[data-tone="special"] {
      border-style: solid;
      border-color: rgba(109, 158, 201, 0.24);
      background: rgb(240, 247, 252);
      color: #476889;
    }

    .search-result[data-tone="away"] {
      border-style: solid;
      border-color: rgba(201, 107, 98, 0.24);
      background: rgb(253, 241, 239);
      color: #8e534e;
    }

    .search-result strong {
      color: var(--text);
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .search-result[data-tone="present"] strong,
    .search-result[data-tone="special"] strong,
    .search-result[data-tone="away"] strong {
      color: currentColor;
    }

    .search-result-meta {
      font-size: 14px;
      line-height: 1.6;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-stat {
      border-radius: 18px;
      padding: 16px;
      background: rgba(255,255,255,0.56);
      border: 1px solid rgba(124, 96, 69, 0.08);
    }

    .summary-stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .summary-stat strong {
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: -0.04em;
    }

    .summary-stat[data-tone="total"] strong { color: #9c6a45; }
    .summary-stat[data-tone="present"] strong { color: var(--present); }
    .summary-stat[data-tone="away"] strong { color: var(--away); }

    .summary-headline {
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1.35;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
    }

    .summary-badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .summary-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.68);
      border: 1px solid rgba(124, 96, 69, 0.1);
      font-size: 14px;
      color: var(--text);
    }

    .summary-badge.is-away { color: #8e534e; background: rgba(253,241,239,0.9); }
    .summary-badge.is-special { color: #476889; background: rgba(240,247,252,0.9); }
    .summary-badge.is-present { color: #416a55; background: rgba(240,248,242,0.9); }

    .update-time {
      color: var(--muted);
      font-size: 13px;
    }

    .class-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .class-card {
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 260px;
    }

    .class-card-top {
      justify-content: space-between;
      align-items: flex-start;
    }

    .class-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .class-title {
      font-size: 22px;
      letter-spacing: -0.03em;
      margin-bottom: 0;
    }

    .class-subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .class-inline-stats {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
    }

    .class-inline-stat {
      appearance: none;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      border-radius: 999px;
      background: rgba(255,255,255,0.45);
      padding: 6px 10px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
    }

    .class-inline-stat[data-tone="total"] { color: var(--present-soft); }
    .class-inline-stat[data-tone="away"] { color: var(--away); }
    .class-inline-stat[data-tone="present"] { color: var(--present); }

    .class-inline-stat:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(156, 119, 83, 0.12);
    }

    .class-inline-stat.active {
      background: rgba(255,255,255,0.96);
      border-color: rgba(219, 135, 83, 0.2);
      box-shadow: 0 14px 24px rgba(228, 177, 141, 0.16);
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-content: flex-start;
      min-height: 88px;
    }

    .chip-empty {
      align-self: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(156, 119, 83, 0.12);
    }

    .chip-present {
      color: #416a55;
      background: rgba(240, 248, 242, 0.92);
      border-color: rgba(79, 143, 112, 0.18);
    }

    .chip-present-soft {
      color: #476889;
      background: rgba(240, 247, 252, 0.92);
      border-color: rgba(109, 158, 201, 0.18);
    }

    .chip-away {
      color: #8e534e;
      background: rgba(253, 241, 239, 0.95);
      border-color: rgba(201, 107, 98, 0.18);
    }

    .chip-highlight {
      box-shadow: 0 0 0 4px rgba(240, 195, 140, 0.34), 0 16px 30px rgba(223, 161, 111, 0.26);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(93, 63, 42, 0.18);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }

    .modal-card,
    .onboarding-card {
      border-radius: 28px;
      width: min(480px, 100%);
      padding: 28px;
      background: var(--surface-strong);
    }

    .modal-card h3,
    .onboarding-card h2 {
      font-size: 28px;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }

    .modal-card p,
    .onboarding-card p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .status-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .status-btn,
    .btn-cancel {
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(124, 96, 69, 0.12);
      color: var(--text);
      font-weight: 600;
    }

    .status-btn[data-status="etc"] {
      grid-column: 1 / -1;
    }

    .btn-cancel {
      width: 100%;
    }

    .onboarding {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(255, 247, 240, 0.76);
      backdrop-filter: blur(10px);
      z-index: 60;
    }

    .onboarding.visible {
      display: flex;
    }

    .onboarding-card {
      width: min(560px, 100%);
    }

    .helper {
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
    }

    @media (max-width: 920px) {
      .page-layout,
      .class-grid {
        grid-template-columns: 1fr;
      }

      .nav-sidebar {
        display: none;
      }

      .main-stage,
      .search-header {
        margin-left: 0;
        width: 100%;
        padding: 0;
      }

      .content-column {
        max-width: none;
      }

      .mobile-notice-btn {
        display: inline-flex;
      }

      .notice-page {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(92vw, 380px);
        max-height: none;
        border-radius: 28px 0 0 28px;
        z-index: 80;
        transform: translateX(100%);
        transition: transform .24s ease;
        background: rgba(255,255,255,0.98);
        overflow: auto;
      }

      .mobile-drawer-notice {
        display: flex;
      }

      .notice-page.visible {
        transform: translateX(0);
      }

      .drawer-close-btn {
        display: inline-flex;
      }

      .drawer-backdrop.visible {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(85, 59, 37, 0.18);
        backdrop-filter: blur(4px);
        z-index: 70;
      }
    }

    @media (max-width: 840px) {
      body {
        padding: 22px 14px 36px;
      }

      .hero-card,
      .search-card,
      .summary-card,
      .classes-section,
      .class-card,
      .modal-card,
      .onboarding-card {
        padding: 20px;
      }

      .status-options {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .summary-stat {
        padding: 12px 10px;
      }

      .summary-stat span {
        font-size: 11px;
        margin-bottom: 6px;
      }

      .summary-stat strong {
        font-size: 20px;
      }

      .hero-actions,
      .section-heading-row,
      .classes-heading-row,
      .class-card-top {
        align-items: stretch;
      }

      .grade-switch {
        width: 100%;
        justify-content: space-between;
      }

      .grade-btn {
        flex: 1;
        text-align: center;
      }

      .notice-input {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <div id="teacherNameOverlay" class="onboarding" aria-modal="true" role="dialog">
    <form id="teacherNameForm" class="onboarding-card">
      <h2>어떻게 불러드릴까요?</h2>
      <p>처음 한 번만 이름을 저장하면, 이 기기에서는 공지 작성 시 선생님 이름이 자동으로 입력돼요.</p>
      <input id="teacherNameInput" class="text-input" type="text" maxlength="80" placeholder="예: 홍길동" autocomplete="name" />
      <div class="onboarding-actions" style="margin-top:16px;">
        <button class="solid-btn" type="submit">저장하고 시작하기</button>
        <span id="teacherNameHelper" class="helper"></span>
      </div>
    </form>
  </div>

  <main class="shell">
    <section class="search-header" aria-label="학생 검색">
      <div class="search-header-bar">
        <input id="studentSearchInput" class="search-input" type="text" inputmode="numeric" autocomplete="off" maxlength="4" placeholder="학번 입력 (예: 1330)" />
      </div>
      <div id="studentSearchResult" class="search-result search-result-overlay"></div>
    </section>

    <div class="page-layout">
      <aside class="nav-sidebar" aria-label="페이지 이동">
        <a class="nav-item active" href="/teacher">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 12.5 12 5l8 7.5V20a1 1 0 0 1-1 1h-4.5v-5.5h-5V21H5a1 1 0 0 1-1-1v-7.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          <span class="nav-label">전체 현황</span>
        </a>
        <a class="nav-item" href="/teacher/notices">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 7.5A2.5 2.5 0 0 1 8.5 5H18a1 1 0 0 1 1 1v9.5A2.5 2.5 0 0 1 16.5 18H9l-4 2.5V8.5A1 1 0 0 1 6 7.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 9h6M9 12h6M9 15h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span class="nav-label">공지사항</span>
        </a>
        <a class="nav-item" href="/teacher/wallpapers">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 6.5A1.5 1.5 0 0 1 6.5 5h11A1.5 1.5 0 0 1 19 6.5v11a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 5 17.5v-11Z" stroke="currentColor" stroke-width="1.8"/><path d="m7.5 16 3.2-3.2a1 1 0 0 1 1.4 0l1.4 1.4a1 1 0 0 0 1.4 0l1.6-1.6a1 1 0 0 1 1.4 0L19 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="9" r="1.25" fill="currentColor"/></svg>
          <span class="nav-label">배경화면</span>
        </a>
      </aside>

      <div class="main-stage">
        <section id="dashboardView" class="content-view content-column">
          <section class="hero-card">
            <div class="hero-top">
              <div>
                <h1 id="greetingTitle" class="hero-title">선생님, 좋은 하루예요.</h1>
              </div>
              <div class="hero-actions">
                <div class="grade-switch" id="gradeButtons">
                  <button class="grade-btn active" data-grade="1" type="button">1학년</button>
                  <button class="grade-btn" data-grade="2" type="button">2학년</button>
                  <button class="grade-btn" data-grade="3" type="button">3학년</button>
                </div>
                <button id="openNoticeDrawerBtn" class="ghost-btn mobile-notice-btn" type="button">공지</button>
                <button id="editTeacherNameBtn" class="ghost-btn" type="button">이름 수정</button>
              </div>
            </div>
          </section>

          <section class="summary-card">
            <div class="section-heading-row">
              <div class="section-heading">
                <h2><span id="gradeLabel">1</span>학년 요약</h2>

              <div class="update-time" id="updateTime">마지막 업데이트: --:--</div>

            <div class="summary-grid">

          <section class="classes-section">

  </main>
  <section id="noticeView" class="notice-page mobile-drawer-notice" hidden aria-label="공지사항">
    <div class="notice-page-header">
      <h2>공지사항</h2>
      <button id="closeNoticeDrawerBtn" class="ghost-btn drawer-close-btn" type="button">닫기</button>
    </div>

    <div class="notice-form">
      <div class="notice-row">
        <input id="noticeTeacherName" class="notice-input" type="text" placeholder="선생님 이름" maxlength="80" />
        <select id="noticeExpiry" class="notice-input" aria-label="공지 표시 시간">
          <option value="">계속 표시</option>
          <option value="10m">10분 후 숨김</option>
          <option value="30m">30분 후 숨김</option>
          <option value="1h">1시간 후 숨김</option>
          <option value="today">오늘 자정까지</option>
        </select>
        <label class="notice-target-toggle">
          <input id="noticeAllTargets" type="checkbox" checked />
          전체(모든 반)
        </label>
        <label class="notice-target-toggle">
          <input id="noticePopup" type="checkbox" />
          중앙 팝업으로 띄우기
        </label>
      </div>
      <textarea id="noticeText" class="notice-textarea" placeholder="공지 내용을 입력하세요 (최대 500자)" maxlength="500"></textarea>
      <div id="noticeTargetsWrap" class="notice-targets-wrap">
        <div class="target-group-row" id="noticeTargetGroups"></div>
        <div class="target-chip-grid" id="noticeTargets"></div>
      </div>
      <div class="notice-row">
        <button id="noticeSendBtn" class="notice-send" type="button">공지 보내기</button>
        <span id="noticeFeedback" class="notice-feedback"></span>

    <section class="notice-history">
      <h3>공지 히스토리</h3>
      <div id="noticeHistoryList" class="notice-history-list"></div>
      <div id="noticeHistoryEmpty" class="notice-history-empty">아직 공지가 없습니다.</div>
    </section>
  </section>
  <div id="noticeDrawerBackdrop" class="drawer-backdrop"></div>

  <div id="statusModal" class="modal" aria-modal="true" role="dialog">
    <div class="modal-card">
      <h3 id="modalTitle">상태 변경</h3>
      <p>학생 상태를 빠르게 수정할 수 있어요. 기타를 누르면 사유를 함께 입력할 수 있습니다.</p>
      <div class="status-options">
        <button class="status-btn" data-status="toilet" type="button">화장실</button>
        <button class="status-btn" data-status="hallway" type="button">복도</button>
        <button class="status-btn" data-status="club" type="button">동아리</button>
        <button class="status-btn" data-status="afterschool" type="button">방과후</button>
        <button class="status-btn" data-status="project" type="button">프로젝트</button>
        <button class="status-btn" data-status="early" type="button">조기입실</button>
        <button class="status-btn" data-status="absence" type="button">결석</button>
        <button class="status-btn" data-status="section" type="button">교실</button>
        <button class="status-btn" data-status="etc" type="button">기타</button>
      </div>
      <div id="etcBoxModal" style="margin-top:14px; display:none;">
        <input id="etcReasonModal" class="input" placeholder="기타 사유 입력" />
      </div>
      <div class="modal-footer" style="margin-top:16px;">
        <button id="closeModal" class="btn-cancel" type="button">닫기</button>
      </div>
    </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script>
    const TEACHER_NAME_KEY = 'dimicheck:teacher-display-name';
    const AWAY_TAGS = new Set(['club', 'afterschool', 'project', 'early', 'etc', 'absence']);
    const PRESENT_SPECIAL_TAGS = new Set(['toilet', 'hallway']);
    const EMPTY_SNAPSHOT = Object.freeze({ magnets: {}, total: 0, absence: 0, present: 0 });
    const LABELS = {
      toilet: '화장실',
      hallway: '복도',
      club: '동아리',
      afterschool: '방과후',
      project: '프로젝트',
      early: '조기입실',
      etc: '기타',
      absence: '결석',
      section: '교실',
    };
    const SUMMARY_ORDER = ['section', 'toilet', 'hallway', 'club', 'afterschool', 'project', 'early', 'etc', 'absence'];

    let currentGrade = 1;
    let gradeStateSnapshot = new Map();
    const gradeStateCache = new Map();
    let gradeStateRequestToken = 0;
    let gradeStateAbortController = null;
    let gradeReloadTimer = null;
    let skipRealtimeReloadUntil = 0;
    let searchRequestToken = 0;
    let highlightedChipTimer = null;
    let targetInfo = null;
    const sockets = {};
    let lastSummaryRenderSignature = '';
    let lastSearchRenderSignature = '';

    const gradeButtons = Array.from(document.querySelectorAll('.grade-btn'));
    const noticeView = document.getElementById('noticeView');
    const classGrid = document.getElementById('classGrid');
    const gradeLabel = document.getElementById('gradeLabel');
    const updateTime = document.getElementById('updateTime');
    const summaryHeadline = document.getElementById('summaryHeadline');
    const summaryBadges = document.getElementById('summaryBadges');
    const totalEl = document.getElementById('grade-total');
    const presentEl = document.getElementById('grade-present');
    const absenceEl = document.getElementById('grade-absence');
    const studentSearchInput = document.getElementById('studentSearchInput');
    const studentSearchResult = document.getElementById('studentSearchResult');
    const noticeTeacherName = document.getElementById('noticeTeacherName');
    const noticeText = document.getElementById('noticeText');
    const noticeExpiry = document.getElementById('noticeExpiry');
    const noticeAllTargets = document.getElementById('noticeAllTargets');
    const noticePopup = document.getElementById('noticePopup');
    const noticeTargetsWrap = document.getElementById('noticeTargetsWrap');
    const noticeTargetGroups = document.getElementById('noticeTargetGroups');
    const noticeTargetContainer = document.getElementById('noticeTargets');
    const noticeSendBtn = document.getElementById('noticeSendBtn');
    const noticeFeedback = document.getElementById('noticeFeedback');
    const openNoticeDrawerBtn = document.getElementById('openNoticeDrawerBtn');
    const closeNoticeDrawerBtn = document.getElementById('closeNoticeDrawerBtn');
    const noticeDrawerBackdrop = document.getElementById('noticeDrawerBackdrop');
    const noticeHistoryList = document.getElementById('noticeHistoryList');
    const noticeHistoryEmpty = document.getElementById('noticeHistoryEmpty');
    const teacherNameOverlay = document.getElementById('teacherNameOverlay');
    const teacherNameForm = document.getElementById('teacherNameForm');
    const teacherNameInput = document.getElementById('teacherNameInput');
    const teacherNameHelper = document.getElementById('teacherNameHelper');
    const greetingTitle = document.getElementById('greetingTitle');
    const editTeacherNameBtn = document.getElementById('editTeacherNameBtn');
    const modal = document.getElementById('statusModal');
    const modalTitle = document.getElementById('modalTitle');
    const etcBoxModal = document.getElementById('etcBoxModal');
    const etcReasonModal = document.getElementById('etcReasonModal');
    let noticeHistoryRequestToken = 0;
    let connectedSocketCount = 0;

    function escapeHTML(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getStoredTeacherName() {
      try {
        return (localStorage.getItem(TEACHER_NAME_KEY) || '').trim();
      } catch (_) {
        return '';
      }
    }

    function setStoredTeacherName(name) {
      const normalized = String(name || '').trim().slice(0, 80);
      try {
        if (normalized) {
          localStorage.setItem(TEACHER_NAME_KEY, normalized);
        } else {
          localStorage.removeItem(TEACHER_NAME_KEY);
        }
      } catch (_) {
        // ignore storage errors
      }
      applyTeacherName(normalized);
      return normalized;
    }

    function applyTeacherName(name) {
      const normalized = String(name || '').trim();
      const suffix = normalized ? `${normalized} 선생님` : '선생님';
      greetingTitle.textContent = `${suffix}, 좋은 하루예요.`;
      if (document.activeElement !== noticeTeacherName || !noticeTeacherName.value.trim()) {
        noticeTeacherName.value = normalized;
      }
      teacherNameInput.value = normalized;
    }

    function openTeacherNameOverlay(prefill = '') {
      teacherNameOverlay.classList.add('visible');
      teacherNameHelper.textContent = '';
      teacherNameInput.value = prefill;
      window.requestAnimationFrame(() => teacherNameInput.focus());
    }

    function closeTeacherNameOverlay() {
      teacherNameOverlay.classList.remove('visible');
      teacherNameHelper.textContent = '';
    }

    function ensureTeacherNameOnboarding() {
      const stored = getStoredTeacherName();
      applyTeacherName(stored);
      if (!stored) {
        openTeacherNameOverlay('');
      }
    }

    function createClassCards() {
      classGrid.innerHTML = Array.from({ length: 6 }, (_, index) => {
        const section = index + 1;
        return `
          <article class="class-card" data-section="${section}" data-view="away">
            <div class="class-card-top">
              <div>
                <div class="class-title-row">
                  <h3 class="class-title">${currentGrade}-${section}반</h3>
                  <div class="class-inline-stats">
                    <button class="class-inline-stat" type="button" data-tone="total" data-view="total">총원 <strong>0</strong></button>
                    <button class="class-inline-stat active" type="button" data-tone="away" data-view="away">결원 <strong>0</strong></button>
                    <button class="class-inline-stat" type="button" data-tone="present" data-view="present">현원 <strong>0</strong></button>
                  </div>
                </div>
                <p class="class-subtitle">기본 보기: 결원</p>
              </div>
            </div>
            <div class="chip-list"></div>
          </article>
        `;
      }).join('');
    }

    function formatTime(dateLike) {
      const date = dateLike instanceof Date ? dateLike : new Date(dateLike);
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    function formatNoticeTime(dateLike) {
      const date = dateLike instanceof Date ? dateLike : new Date(dateLike);
      if (Number.isNaN(date.getTime())) return '--:--';
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      return `${month}/${day} ${h}:${m}`;
    }

    function getNoticeExpiryPayload() {
      const preset = noticeExpiry?.value || '';
      const durations = {
        '10m': 10 * 60,
        '30m': 30 * 60,
        '1h': 60 * 60,
      };
      if (durations[preset]) {
        return { expiresInSeconds: durations[preset] };
      }
      if (preset === 'today') {
        return { expiresPreset: 'today' };
      }
      return {};
    }

    function formatNoticeExpiry(notice) {
      if (!notice?.autoHide) return '';
      if (notice?.expired) return '만료됨';
      const expiresAt = notice?.expiresAt || notice?.expiresAtMs;
      return `자동 숨김${expiresAt ? ` · ${formatNoticeTime(expiresAt)}` : ''}`;
    }

    function isMobileNoticeDrawerMode() {
      return window.matchMedia('(max-width: 920px)').matches;
    }

    function openNoticeDrawer() {
      if (!isMobileNoticeDrawerMode()) return;
      noticeView.hidden = false;
      noticeView.classList.add('visible');
      noticeDrawerBackdrop.classList.add('visible');
      loadNoticeHistory(currentGrade);
    }

    function closeNoticeDrawer() {
      noticeView.classList.remove('visible');
      noticeDrawerBackdrop.classList.remove('visible');
      if (isMobileNoticeDrawerMode()) {
        noticeView.hidden = true;
      }
    }

    function syncNoticeDrawerMode() {
      if (!isMobileNoticeDrawerMode()) {
        closeNoticeDrawer();
        noticeView.hidden = true;
      }
    }

    function dedupeNotices(notices) {
      const map = new Map();
      (notices || []).forEach((notice) => {
        const id = Number(notice?.id);
        if (!Number.isFinite(id)) return;
        const prev = map.get(id);
        if (!prev || Number(notice?.createdAtMs || 0) > Number(prev?.createdAtMs || 0)) {
          map.set(id, notice);
        }
      });
      return Array.from(map.values()).sort((a, b) => Number(b?.createdAtMs || 0) - Number(a?.createdAtMs || 0));
    }

    function renderNoticeHistory(notices) {
      const items = Array.isArray(notices) ? notices : [];
      noticeHistoryList.innerHTML = items.map((notice) => {
        const teacher = escapeHTML(notice?.teacherName || '선생님');
        const text = escapeHTML(notice?.text || '');
        const target = escapeHTML(notice?.targetLabel || '');
        const created = formatNoticeTime(notice?.createdAt || notice?.createdAtMs || Date.now());
        const expiry = formatNoticeExpiry(notice);
        return `
          <article class="notice-history-item">
            <div class="notice-history-meta">
              <span>${teacher}</span>
              <span>${created}</span>
            </div>
            <div class="notice-history-text">${text}</div>
            <div class="notice-history-target">${target}${expiry ? ` · ${escapeHTML(expiry)}` : ''}</div>
          </article>
        `;
      }).join('');
      noticeHistoryEmpty.style.display = items.length ? 'none' : '';
    }

    async function loadNoticeHistory(grade) {
      const requestToken = ++noticeHistoryRequestToken;
      try {
        const requests = Array.from({ length: 6 }, (_, index) => {
          const section = index + 1;
          return fetch(`/api/classes/notices?grade=${grade}&section=${section}&mode=all`, {
            cache: 'no-store',
          })
            .then((response) => response.ok ? response.json() : null)
            .catch(() => null);
        });
        const payloads = await Promise.all(requests);
        if (requestToken !== noticeHistoryRequestToken) return;
        const notices = dedupeNotices(payloads.flatMap((payload) => Array.isArray(payload?.notices) ? payload.notices : []));
        renderNoticeHistory(notices);
      } catch (error) {
        if (requestToken !== noticeHistoryRequestToken) return;
        console.warn('notice history load failed', error);
      }
    }

    function setActiveGrade(grade) {
      currentGrade = grade;
      gradeButtons.forEach((button) => {
        button.classList.toggle('active', Number(button.dataset.grade) === grade);
      });
      gradeLabel.textContent = String(grade);
      document.querySelectorAll('#classGrid .class-card').forEach((card, index) => {
        card.querySelector('.class-title').textContent = `${grade}-${index + 1}반`;
      });
    }

    function getSectionSnapshot(section) {
      return gradeStateSnapshot.get(Number(section)) || EMPTY_SNAPSHOT;
    }

    function getNormalizedCategory(data) {
      const category = data?.attachedTo;
      if (!category || category === 'section') return 'section';
      return category;
    }

    function getToneForCategory(category) {
      if (category === 'section') return 'present';
      if (PRESENT_SPECIAL_TAGS.has(category)) return 'special';
      return 'away';
    }

    function getLabelForData(data) {
      const category = getNormalizedCategory(data);
      if (category === 'etc') {
        const reason = String(data?.reason || '').trim();
        return reason ? `기타 · ${reason}` : LABELS.etc;
      }
      return LABELS[category] || '이동';
    }

    function buildCardChipItems(magnets, grade, section, view = 'away') {
      const items = [];

      Object.entries(magnets || {}).forEach(([numStr, data]) => {
        const num = Number(numStr);
        if (!Number.isFinite(num) || num <= 0) return;
        const category = getNormalizedCategory(data);
        const isPresentNormal = category === 'section';
        const isPresentSpecial = PRESENT_SPECIAL_TAGS.has(category);
        const isAway = AWAY_TAGS.has(category);
        const label = getLabelForData(data);

        if (view === 'total') {
          if (isPresentNormal) {
            items.push({ key: String(num), num, className: 'chip chip-present', text: `${num}번 ${LABELS.section}`, grade, section, status: category });
          } else if (isPresentSpecial) {
            items.push({ key: String(num), num, className: 'chip chip-present-soft', text: `${num}번 ${label}`, grade, section, status: category });
          } else if (isAway) {
            items.push({ key: String(num), num, className: 'chip chip-away', text: `${num}번 ${label}`, grade, section, status: category });
          }
          return;
        }

        if (view === 'away' && isAway) {
          items.push({ key: String(num), num, className: 'chip chip-away', text: `${num}번 ${label}`, grade, section, status: category });
        }

        if (view === 'present' && (isPresentNormal || isPresentSpecial)) {
          if (isPresentNormal) {
            items.push({ key: String(num), num, className: 'chip chip-present', text: `${num}번 ${LABELS.section}`, grade, section, status: category });
          } else {
            items.push({ key: String(num), num, className: 'chip chip-present-soft', text: `${num}번 ${label}`, grade, section, status: category });
          }
        }
      });

      if (view === 'total') {
        items.sort((a, b) => a.num - b.num);
      }

      return items;
    }

    function reconcileChipList(chipList, items, emptyMessage) {
      const existingChips = new Map(
        Array.from(chipList.querySelectorAll('.chip')).map((chip) => [chip.dataset.chipKey, chip])
      );
      const emptyNode = chipList.querySelector('.chip-empty');

      if (!items.length) {
        existingChips.forEach((chip) => chip.remove());
        const targetEmpty = emptyNode || document.createElement('div');
        targetEmpty.className = 'chip-empty';
        if (targetEmpty.textContent !== emptyMessage) {
          targetEmpty.textContent = emptyMessage;
        }
        if (!targetEmpty.isConnected) {
          chipList.appendChild(targetEmpty);
        }
        return;
      }

      if (emptyNode) {
        emptyNode.remove();
      }

      items.forEach((item, index) => {
        let chip = existingChips.get(item.key);
        if (!chip) {
          chip = document.createElement('button');
          chip.type = 'button';
          chip.dataset.chipKey = item.key;
        }

        if (chip.className !== item.className) {
          chip.className = item.className;
        }
        chip.dataset.number = String(item.num);
        chip.dataset.grade = String(item.grade);
        chip.dataset.section = String(item.section);
        chip.dataset.status = String(item.status);
        if (chip.textContent !== item.text) {
          chip.textContent = item.text;
        }

        const currentChild = chipList.children[index];
        if (currentChild !== chip) {
          chipList.insertBefore(chip, currentChild || null);
        }
        existingChips.delete(item.key);
      });

      existingChips.forEach((chip) => chip.remove());
    }

    function reconcileSummaryBadges(items) {
      const existingBadges = new Map(
        Array.from(summaryBadges.querySelectorAll('.summary-badge')).map((badge) => [badge.dataset.badgeKey, badge])
      );

      items.forEach((item, index) => {
        let badge = existingBadges.get(item.key);
        if (!badge) {
          badge = document.createElement('span');
          badge.dataset.badgeKey = item.key;
        }
        if (badge.className !== item.className) {
          badge.className = item.className;
        }
        if (badge.textContent !== item.text) {
          badge.textContent = item.text;
        }

        const currentChild = summaryBadges.children[index];
        if (currentChild !== badge) {
          summaryBadges.insertBefore(badge, currentChild || null);
        }
        existingBadges.delete(item.key);
      });

      existingBadges.forEach((badge) => badge.remove());
    }

    function renderClassCard(card, grade, section, snapshot) {
      const view = card.dataset.view || 'away';
      const magnets = snapshot?.magnets || {};
      const total = Number(snapshot?.total) || 0;
      const absence = Number(snapshot?.absence) || 0;
      const present = Number(snapshot?.present) || 0;
      const classroom = Object.values(magnets).reduce((count, data) => {
        return count + (getNormalizedCategory(data) === 'section' ? 1 : 0);
      }, 0);
      const renderSignature = `${Number(grade) || 0}:${view}:${getSectionRenderSignature(snapshot)}`;

      if (card.dataset.renderSignature === renderSignature) {
        return;
      }
      card.dataset.renderSignature = renderSignature;

      card.querySelectorAll('.class-inline-stat').forEach((button) => {
        const buttonView = button.dataset.view;
        button.classList.toggle('active', buttonView === view);
        const valueEl = button.querySelector('strong');
        if (!valueEl) return;
        if (buttonView === 'total') valueEl.textContent = String(total);
        if (buttonView === 'away') valueEl.textContent = String(absence);
        if (buttonView === 'present') valueEl.textContent = `${present} (교실 ${classroom})`;
      });

      const subtitle = card.querySelector('.class-subtitle');
      if (subtitle) {
        subtitle.textContent = view === 'total'
          ? '총원 보기'
          : view === 'present'
            ? '현원 보기'
            : '결원 보기';
      }

      const chipList = card.querySelector('.chip-list');
      const items = buildCardChipItems(magnets, grade, section, view);
      reconcileChipList(
        chipList,
        items,
        total === 0 ? 'DIMICHECK 등록 학생이 아직 없어요.' : '이 보기에는 표시할 학생이 없어요.'
      );
    }

    function countGradeCategories(sections) {
      const counts = Object.create(null);
      Object.keys(LABELS).forEach((key) => { counts[key] = 0; });

      (sections || []).forEach((snapshot) => {
        Object.values(snapshot?.magnets || {}).forEach((data) => {
          const category = getNormalizedCategory(data);
          counts[category] = (counts[category] || 0) + 1;
        });
      });

      return counts;
    }

    function buildSummarySentence(counts) {
      const classroom = counts.section || 0;
      const toilet = counts.toilet || 0;
      const hallway = counts.hallway || 0;
      const away = (counts.club || 0) + (counts.afterschool || 0) + (counts.project || 0) + (counts.early || 0) + (counts.etc || 0) + (counts.absence || 0);
      const segments = [];

      segments.push(`현재 ${classroom}명이 교실에 있으며`);
      if (toilet > 0) segments.push(`${toilet}명이 화장실`);
      if (hallway > 0) segments.push(`${hallway}명이 복도`);
      if (away > 0) segments.push(`${away}명이 결원 상태`);

      if (segments.length === 1) {
        return `${segments[0]} 모두 자리에서 자습 중이에요.`;
      }

      return `${segments[0]}, ${segments.slice(1).join(', ')}예요.`;
    }

    function renderSummary(grade, sections, totals) {
      const counts = countGradeCategories(sections);
      const summarySignature = JSON.stringify({
        grade: Number(grade) || 0,
        counts,
        totals,
      });
      if (lastSummaryRenderSignature === summarySignature) {
        return false;
      }
      lastSummaryRenderSignature = summarySignature;

      summaryHeadline.textContent = buildSummarySentence(counts);

      const badgeItems = SUMMARY_ORDER
        .filter((category) => (counts[category] || 0) > 0)
        .map((category) => {
          const tone = getToneForCategory(category);
          const toneClass = tone === 'away' ? 'is-away' : tone === 'special' ? 'is-special' : 'is-present';
          const label = category === 'etc' ? '기타' : LABELS[category];
          return {
            key: category,
            className: `summary-badge ${toneClass}`,
            text: `${label} ${counts[category]}명`,
          };
        });
      reconcileSummaryBadges(badgeItems);

      totalEl.textContent = String(totals.total);
      presentEl.textContent = String(totals.present);
      absenceEl.textContent = String(totals.absence);
      return true;
    }

    function rememberGradeState(grade, sections) {
      gradeStateCache.set(Number(grade), {
        sections: Array.isArray(sections) ? sections : [],
        fetchedAt: Date.now(),
      });
    }

    function getCachedGradeState(grade) {
      return gradeStateCache.get(Number(grade))?.sections || null;
    }

    function buildSectionSnapshot(section, magnets, updatedAt = null) {
      const safeMagnets = (magnets && typeof magnets === 'object') ? magnets : {};
      const total = Object.keys(safeMagnets).length;
      let absence = 0;

      Object.values(safeMagnets).forEach((data) => {
        const category = getNormalizedCategory(data);
        const isPresentNormal = category === 'section';
        const isPresentSpecial = PRESENT_SPECIAL_TAGS.has(category);
        if (!isPresentNormal && !isPresentSpecial) {
          absence += 1;
        }
      });

      return {
        section: Number(section),
        magnets: safeMagnets,
        total,
        absence,
        present: total - absence,
        updatedAt,
      };
    }

    function upsertGradeSectionCache(grade, snapshot) {
      const normalizedGrade = Number(grade);
      const normalizedSection = Number(snapshot?.section);
      if (!Number.isFinite(normalizedGrade) || !Number.isFinite(normalizedSection)) return;

      const existingSections = Array.isArray(getCachedGradeState(normalizedGrade))
        ? [...getCachedGradeState(normalizedGrade)]
        : [];
      const nextSnapshot = { ...snapshot, section: normalizedSection };
      const index = existingSections.findIndex((item) => Number(item.section) === normalizedSection);

      if (index >= 0) {
        existingSections[index] = nextSnapshot;
      } else {
        existingSections.push(nextSnapshot);
      }

      existingSections.sort((a, b) => Number(a.section) - Number(b.section));
      rememberGradeState(normalizedGrade, existingSections);
    }

    function getSnapshotSectionsForCurrentGrade() {
      return Array.from({ length: 6 }, (_, index) => getSectionSnapshot(index + 1));
    }

    function getSectionRenderSignature(snapshot) {
      return JSON.stringify({
        section: Number(snapshot?.section) || 0,
        magnets: snapshot?.magnets || {},
        total: Number(snapshot?.total) || 0,
        absence: Number(snapshot?.absence) || 0,
        present: Number(snapshot?.present) || 0,
      });
    }

    function renderCurrentGradeSummary(updatedAt = null, options = {}) {
      const sections = getSnapshotSectionsForCurrentGrade();
      const totals = sections.reduce((acc, snapshot) => {
        acc.total += Number(snapshot?.total) || 0;
        acc.absence += Number(snapshot?.absence) || 0;
        acc.present += Number(snapshot?.present) || 0;
        return acc;
      }, { total: 0, absence: 0, present: 0 });

      const didRender = renderSummary(currentGrade, sections, totals);
      if (didRender || options.forceTimestamp) {
        updateTime.textContent = `마지막 업데이트: ${formatTime(updatedAt || new Date())}`;
      }
      return didRender;
    }

    function applyIncrementalSectionUpdate(grade, snapshot) {
      const normalizedGrade = Number(grade);
      const normalizedSection = Number(snapshot?.section);
      if (!Number.isFinite(normalizedGrade) || !Number.isFinite(normalizedSection)) return;
      const previousSnapshot = normalizedGrade === Number(currentGrade)
        ? gradeStateSnapshot.get(normalizedSection)
        : null;
      if (previousSnapshot && getSectionRenderSignature(previousSnapshot) === getSectionRenderSignature(snapshot)) {
        return;
      }

      upsertGradeSectionCache(normalizedGrade, snapshot);

      if (normalizedGrade !== Number(currentGrade)) {
        return;
      }

      gradeStateSnapshot.set(normalizedSection, snapshot);
      const card = document.querySelector(`.class-card[data-section="${normalizedSection}"]`);
      if (card) {
        renderClassCard(card, normalizedGrade, normalizedSection, snapshot);
      }
      renderCurrentGradeSummary(snapshot.updatedAt || new Date());
      refreshSearchIfNeeded({ changedGrade: normalizedGrade, changedSection: normalizedSection });
    }

    async function fetchGradeStateOnce(grade, options = {}) {
      const response = await fetch(`/api/classes/grade-state?grade=${grade}`, {
        cache: 'no-store',
        signal: options.signal,
      });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      const parsed = await response.json();
      const sections = Array.isArray(parsed?.sections) ? parsed.sections : [];
      rememberGradeState(grade, sections);
      return sections;
    }

    function refreshSearchIfNeeded(options = {}) {
      const value = studentSearchInput.value.trim();
      if (!value) {
        lastSearchRenderSignature = '';
        hideSearchOverlay();
        return;
      }

      if (options.force) {
        handleStudentSearch(value);
        return;
      }

      const parsed = parseStudentCode(value);
      if (parsed.kind !== 'ready') {
        handleStudentSearch(value);
        return;
      }

      if (
        Number(parsed.grade) === Number(options.changedGrade) &&
        Number(parsed.section) === Number(options.changedSection)
      ) {
        handleStudentSearch(value);
      }
    }

    function renderGradeState(grade, sections) {
      gradeStateSnapshot = new Map((sections || []).map((snapshot) => [Number(snapshot.section), snapshot]));

      document.querySelectorAll('#classGrid .class-card').forEach((card, index) => {
        const section = index + 1;
        const snapshot = getSectionSnapshot(section);
        renderClassCard(card, grade, section, snapshot);
      });

      renderCurrentGradeSummary(new Date(), { forceTimestamp: true });
    }

    async function loadClassState(grade) {
      const requestToken = ++gradeStateRequestToken;
      if (gradeStateAbortController) {
        gradeStateAbortController.abort();
      }
      gradeStateAbortController = new AbortController();

      try {
        const sections = await fetchGradeStateOnce(grade, { signal: gradeStateAbortController.signal });
        if (requestToken !== gradeStateRequestToken) return;

        if (Number(grade) === Number(currentGrade) && gradeStateSnapshot.size) {
          const previousSnapshot = new Map(gradeStateSnapshot);
          gradeStateSnapshot = new Map((sections || []).map((snapshot) => [Number(snapshot.section), snapshot]));

          const changedSections = [];
          document.querySelectorAll('#classGrid .class-card').forEach((card, index) => {
            const section = index + 1;
            const nextSnapshot = getSectionSnapshot(section);
            const prevSnapshot = previousSnapshot.get(section) || EMPTY_SNAPSHOT;
            if (getSectionRenderSignature(prevSnapshot) === getSectionRenderSignature(nextSnapshot)) {
              return;
            }
            changedSections.push(section);
            renderClassCard(card, grade, section, nextSnapshot);
          });

          renderCurrentGradeSummary(new Date(), { forceTimestamp: changedSections.length > 0 });
          changedSections.forEach((section) => {
            refreshSearchIfNeeded({ changedGrade: Number(grade), changedSection: section });
          });
          return;
        }

        renderGradeState(grade, sections);
        refreshSearchIfNeeded({ force: true });
      } catch (error) {
        if (error?.name === 'AbortError') return;
        console.warn('loadClassState failed', error);
      }
    }

    function scheduleGradeReload(grade, delay = 120) {
      if (gradeReloadTimer) clearTimeout(gradeReloadTimer);
      gradeReloadTimer = window.setTimeout(() => {
        gradeReloadTimer = null;
        if (Number(grade) === Number(currentGrade)) {
          loadClassState(grade);
        } else {
          gradeStateCache.delete(Number(grade));
        }
      }, delay);
    }

    function parseStudentCode(rawValue) {
      const digits = String(rawValue || '').replace(/\D/g, '').slice(0, 4);
      const grade = Number(digits[0]);
      const section = Number(digits[1]);
      const number = Number(digits.slice(2));
      if (digits.length < 3) return { kind: digits ? 'partial' : 'empty', digits };
      if (![1, 2, 3].includes(grade) || ![1, 2, 3, 4, 5, 6].includes(section) || !Number.isFinite(number) || number <= 0 || number >= 100) {
        return { kind: 'invalid', digits };
      }
      return { kind: 'ready', digits, grade, section, number };
    }

    function renderSearchMessage(message, tone = '') {
      const signature = JSON.stringify({ type: 'message', tone, message });
      if (lastSearchRenderSignature === signature) {
        return;
      }
      lastSearchRenderSignature = signature;
      studentSearchResult.dataset.tone = tone;
      studentSearchResult.innerHTML = `<div class="search-result-meta">${escapeHTML(message)}</div>`;
    }

    function showSearchOverlay() {
      studentSearchResult.classList.add('visible');
    }

    function hideSearchOverlay() {
      studentSearchResult.classList.remove('visible');
    }

    function syncSearchOverlayVisibility() {
      if (document.activeElement === studentSearchInput && studentSearchInput.value.trim()) {
        showSearchOverlay();
        return;
      }
      hideSearchOverlay();
    }

    function renderSearchResult(parsed, data) {
      const category = getNormalizedCategory(data);
      const tone = getToneForCategory(category);
      const label = getLabelForData(data);
      const locationLine = category === 'section'
        ? '현재 교실에 있어요.'
        : PRESENT_SPECIAL_TAGS.has(category)
          ? `현재 ${label}에 있어요.`
          : `현재 ${label} 상태예요.`;
      const jumpButton = parsed.grade !== currentGrade
        ? `<button class="jump-btn" type="button" data-action="jump-grade" data-grade="${parsed.grade}" data-section="${parsed.section}" data-number="${parsed.number}">이 학년 보기</button>`
        : `<button class="jump-btn" type="button" data-action="focus-student" data-grade="${parsed.grade}" data-section="${parsed.section}" data-number="${parsed.number}">해당 반에서 보기</button>`;
      const signature = JSON.stringify({
        type: 'result',
        grade: parsed.grade,
        section: parsed.section,
        number: parsed.number,
        tone,
        label,
        currentGrade,
      });

      if (lastSearchRenderSignature === signature) {
        return;
      }
      lastSearchRenderSignature = signature;

      studentSearchResult.dataset.tone = tone;
      studentSearchResult.innerHTML = `
        <div class="search-result-header">
          <strong>${parsed.grade}학년 ${parsed.section}반 ${parsed.number}번</strong>
          ${jumpButton}
        </div>
        <div class="search-result-meta">${escapeHTML(locationLine)}</div>
      `;
    }

    async function handleStudentSearch(rawValue) {
      const parsed = parseStudentCode(rawValue);
      studentSearchInput.value = parsed.digits || '';

      if (parsed.kind === 'empty') {
        lastSearchRenderSignature = '';
        hideSearchOverlay();
        return;
      }
      if (parsed.kind === 'partial') {
        renderSearchMessage('학번을 끝까지 입력하면 바로 상태를 보여드릴게요.');
        syncSearchOverlayVisibility();
        return;
      }
      if (parsed.kind === 'invalid') {
        renderSearchMessage('학번 형식을 다시 확인해주세요. 예: 1330 → 1학년 3반 30번');
        syncSearchOverlayVisibility();
        return;
      }

      const requestToken = ++searchRequestToken;
      try {
        const sections = parsed.grade === currentGrade
          ? Array.from(gradeStateSnapshot.values())
          : await fetchGradeStateOnce(parsed.grade);
        if (requestToken !== searchRequestToken) return;

        const snapshot = sections.find((item) => Number(item.section) === parsed.section) || EMPTY_SNAPSHOT;
        const data = snapshot?.magnets?.[String(parsed.number)] || snapshot?.magnets?.[parsed.number];
        if (!data) {
          const missingSignature = JSON.stringify({
            type: 'missing',
            grade: parsed.grade,
            section: parsed.section,
            number: parsed.number,
          });
          if (lastSearchRenderSignature !== missingSignature) {
            lastSearchRenderSignature = missingSignature;
            studentSearchResult.dataset.tone = '';
            studentSearchResult.innerHTML = `
              <strong>${parsed.grade}학년 ${parsed.section}반 ${parsed.number}번</strong>
              <div class="search-result-meta">아직 DIMICHECK에 등록되지 않았거나 상태 데이터가 없어요.</div>
            `;
          }
          syncSearchOverlayVisibility();
          return;
        }

        renderSearchResult(parsed, data);
        syncSearchOverlayVisibility();
      } catch (error) {
        if (requestToken !== searchRequestToken) return;
        console.warn('student search failed', error);
        renderSearchMessage('학생 상태를 불러오지 못했어요. 잠시 후 다시 시도해주세요.');
        syncSearchOverlayVisibility();
      }
    }

    function clearChipHighlight() {
      if (highlightedChipTimer) {
        clearTimeout(highlightedChipTimer);
        highlightedChipTimer = null;
      }
      document.querySelectorAll('.chip-highlight').forEach((chip) => chip.classList.remove('chip-highlight'));
    }

    function focusStudentInCurrentView(section, number) {
      const card = document.querySelector(`.class-card[data-section="${section}"]`);
      if (!card) return;
      card.dataset.view = 'total';
      renderClassCard(card, currentGrade, Number(section), getSectionSnapshot(section));
      const chip = card.querySelector(`.chip[data-number="${number}"]`);
      clearChipHighlight();
      if (!chip) return;
      chip.classList.add('chip-highlight');
      try {
        chip.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
      } catch (_) {
        chip.scrollIntoView();
      }
      highlightedChipTimer = window.setTimeout(() => {
        chip.classList.remove('chip-highlight');
        highlightedChipTimer = null;
      }, 2000);
    }

    function setChipState(chip, checked) {
      const input = chip.querySelector('input');
      if (input) input.checked = checked;
      chip.classList.toggle('active', checked);
    }

    function syncTargetGroupState(grade) {
      const classChips = Array.from(noticeTargetContainer.querySelectorAll(`.target-chip[data-grade="${grade}"]`));
      const groupChip = noticeTargetGroups.querySelector(`.target-group-chip[data-grade="${grade}"]`);
      if (!groupChip || !classChips.length) return;
      const checked = classChips.every((chip) => chip.querySelector('input')?.checked);
      setChipState(groupChip, checked);
    }

    function setGradeTargets(grade, checked) {
      noticeTargetContainer.querySelectorAll(`.target-chip[data-grade="${grade}"]`).forEach((chip) => {
        setChipState(chip, checked);
      });
      syncTargetGroupState(grade);
    }

    function initNoticeTargetSelector() {
      const groupMarkup = [1, 2, 3].map((grade) => `
        <label class="target-group-chip active" data-grade="${grade}">
          <input type="checkbox" checked />
          ${grade}학년 전체
        </label>
      `).join('');
      const classMarkup = Array.from({ length: 18 }, (_, index) => {
        const grade = Math.floor(index / 6) + 1;
        const section = (index % 6) + 1;
        return `
          <label class="target-chip active" data-grade="${grade}" data-section="${section}">
            <input type="checkbox" checked />
            ${grade}-${section}
          </label>
        `;
      }).join('');

      noticeTargetGroups.innerHTML = groupMarkup;
      noticeTargetContainer.innerHTML = classMarkup;

      noticeTargetGroups.querySelectorAll('.target-group-chip').forEach((chip) => {
        chip.addEventListener('click', (event) => {
          event.preventDefault();
          const nextChecked = !(chip.querySelector('input')?.checked);
          setChipState(chip, nextChecked);
          setGradeTargets(Number(chip.dataset.grade), nextChecked);
        });
      });

      noticeTargetContainer.querySelectorAll('.target-chip').forEach((chip) => {
        chip.addEventListener('click', (event) => {
          event.preventDefault();
          const nextChecked = !(chip.querySelector('input')?.checked);
          setChipState(chip, nextChecked);
          syncTargetGroupState(Number(chip.dataset.grade));
        });
      });
    }

    noticeAllTargets.addEventListener('change', () => {
      const enabled = !noticeAllTargets.checked;
      noticeTargetsWrap.classList.toggle('visible', enabled);
      if (!enabled) {
        noticeTargetContainer.querySelectorAll('.target-chip').forEach((chip) => setChipState(chip, true));
        noticeTargetGroups.querySelectorAll('.target-group-chip').forEach((chip) => setChipState(chip, true));
      }
    });

    async function sendTeacherNotice() {
      const teacherName = (noticeTeacherName.value || getStoredTeacherName() || '').trim();
      const text = (noticeText.value || '').trim();
      const popup = Boolean(noticePopup?.checked);

      if (!teacherName) {
        noticeFeedback.textContent = '선생님 이름을 먼저 입력해주세요.';
        openTeacherNameOverlay('');
        return;
      }
      if (!text) {
        noticeFeedback.textContent = '공지 내용을 입력해주세요.';
        return;
      }

      const targets = [];
      if (!noticeAllTargets.checked) {
        noticeTargetContainer.querySelectorAll('.target-chip').forEach((chip) => {
          if (chip.querySelector('input')?.checked) {
            targets.push({
              grade: Number(chip.dataset.grade),
              section: Number(chip.dataset.section),
            });
          }
        });
        if (!targets.length) {
          noticeFeedback.textContent = '대상 반을 하나 이상 선택해주세요.';
          return;
        }
      }

      noticeSendBtn.disabled = true;
      noticeFeedback.textContent = '공지 전송 중...';
      setStoredTeacherName(teacherName);

      try {
        const response = await fetch('/api/classes/notices', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            teacherName,
            text,
            targetClasses: targets,
            popup,
            ...getNoticeExpiryPayload(),
          }),
        });
        const parsed = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(parsed?.error || '공지 전송에 실패했습니다.');
        }
        noticeText.value = '';
        if (noticeExpiry) noticeExpiry.value = '';
        if (noticePopup) noticePopup.checked = false;
        noticeFeedback.textContent = '공지 등록 완료!';
        if (!noticeView.hidden || noticeView.classList.contains('visible')) {
          loadNoticeHistory(currentGrade);
        }
        if (isMobileNoticeDrawerMode()) {
          closeNoticeDrawer();
        }
      } catch (error) {
        noticeFeedback.textContent = error?.message || '공지 전송에 실패했습니다.';
      } finally {
        noticeSendBtn.disabled = false;
      }
    }

    async function saveStudentState(grade, section, studentNumber, status, reason = null) {
      const magnets = {};
      magnets[studentNumber] = { attachedTo: status, reason };

      try {
        const response = await fetch(`/api/classes/state/save?grade=${grade}&section=${section}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ magnets }),
        });
        if (!response.ok) {
          throw new Error(await response.text());
        }
        const parsed = await response.json().catch(() => ({}));
        skipRealtimeReloadUntil = Date.now() + 1500;
        const nextSnapshot = buildSectionSnapshot(
          section,
          parsed?.magnets || {},
          new Date().toISOString(),
        );
        applyIncrementalSectionUpdate(grade, nextSnapshot);
      } catch (error) {
        alert(`저장 실패: ${error.message}`);
      }
    }

    function openStatusSelector(grade, section, studentNumber) {
      modal.style.display = 'flex';
      modalTitle.textContent = `${grade}-${section}반 ${studentNumber}번 상태 변경`;
      targetInfo = { grade, section, studentNumber };
      etcBoxModal.style.display = 'none';
      etcReasonModal.value = '';
    }

    function closeStatusSelector() {
      modal.style.display = 'none';
      targetInfo = null;
      etcBoxModal.style.display = 'none';
      etcReasonModal.value = '';
    }

    function connectToGradeWebSockets(grade) {
      Object.values(sockets).forEach((socket) => {
        if (socket && socket.connected) {
          socket.disconnect();
        }
      });
      Object.keys(sockets).forEach((key) => delete sockets[key]);
      connectedSocketCount = 0;

      for (let section = 1; section <= 6; section += 1) {
        const namespace = `/ws/classes/${grade}/${section}`;
        const socket = io(namespace, {
          transports: ['websocket'],
          reconnection: true,
          reconnectionDelay: 1000,
          reconnectionDelayMax: 5000,
          reconnectionAttempts: Infinity,
        });

        socket.on('connect', () => {
          connectedSocketCount += 1;
        });

        socket.on('disconnect', () => {
          connectedSocketCount = Math.max(0, connectedSocketCount - 1);
        });

        socket.on('state_updated', (data) => {
          if (Number(data.grade) !== Number(currentGrade)) return;
          if (Date.now() < skipRealtimeReloadUntil) return;
          const nextSnapshot = buildSectionSnapshot(
            data.section,
            data?.magnets || {},
            data?.updatedAt || new Date().toISOString(),
          );
          applyIncrementalSectionUpdate(data.grade, nextSnapshot);
        });

        socket.on('connect_error', (error) => {
          console.error(`[Teacher] Connection error for ${namespace}:`, error);
        });

        sockets[`${grade}_${section}`] = socket;
      }
    }

    teacherNameForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const name = teacherNameInput.value.trim();
      if (!name) {
        teacherNameHelper.textContent = '이름을 입력해주세요.';
        teacherNameInput.focus();
        return;
      }
      setStoredTeacherName(name);
      noticeFeedback.textContent = '';
      closeTeacherNameOverlay();
    });

    editTeacherNameBtn.addEventListener('click', () => {
      openTeacherNameOverlay(getStoredTeacherName());
    });

    noticeTeacherName.addEventListener('change', () => {
      const value = noticeTeacherName.value.trim();
      if (value) {
        setStoredTeacherName(value);
      }
    });

    noticeTeacherName.addEventListener('blur', () => {
      const value = noticeTeacherName.value.trim();
      if (value) {
        setStoredTeacherName(value);
      } else {
        noticeTeacherName.value = getStoredTeacherName();
      }
    });

    noticeSendBtn.addEventListener('click', sendTeacherNotice);
    openNoticeDrawerBtn.addEventListener('click', openNoticeDrawer);
    closeNoticeDrawerBtn.addEventListener('click', closeNoticeDrawer);
    noticeDrawerBackdrop.addEventListener('click', closeNoticeDrawer);

    studentSearchInput.addEventListener('input', (event) => {
      handleStudentSearch(event.target.value);
    });

    studentSearchInput.addEventListener('focus', () => {
      syncSearchOverlayVisibility();
    });

    studentSearchInput.addEventListener('blur', () => {
      window.setTimeout(() => {
        hideSearchOverlay();
      }, 0);
    });

    studentSearchResult.addEventListener('mousedown', (event) => {
      event.preventDefault();
    });

    studentSearchResult.addEventListener('click', async (event) => {
      const button = event.target.closest('[data-action]');
      if (!button) return;
      const grade = Number(button.dataset.grade);
      const section = Number(button.dataset.section);
      const number = Number(button.dataset.number);
      if (button.dataset.action === 'jump-grade' && Number.isFinite(grade)) {
        setActiveGrade(grade);
        connectToGradeWebSockets(grade);
        await loadClassState(grade);
        focusStudentInCurrentView(section, number);
        return;
      }
      if (button.dataset.action === 'focus-student') {
        focusStudentInCurrentView(section, number);
      }
    });

    document.getElementById('closeModal').addEventListener('click', closeStatusSelector);

    document.querySelectorAll('.status-btn').forEach((button) => {
      button.addEventListener('click', () => {
        if (!targetInfo) return;
        const status = button.dataset.status;
        if (status === 'etc') {
          etcBoxModal.style.display = 'block';
          etcReasonModal.focus();
          return;
        }
        saveStudentState(targetInfo.grade, targetInfo.section, targetInfo.studentNumber, status);
        closeStatusSelector();
      });
    });

    etcReasonModal.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter' || !targetInfo) return;
      event.preventDefault();
      saveStudentState(targetInfo.grade, targetInfo.section, targetInfo.studentNumber, 'etc', etcReasonModal.value.trim());
      closeStatusSelector();
    });

    gradeButtons.forEach((button) => {
      button.addEventListener('click', async () => {
        const grade = Number(button.dataset.grade);
        if (grade === currentGrade) return;
        clearChipHighlight();
        setActiveGrade(grade);
        connectToGradeWebSockets(grade);
        await loadClassState(grade);
        if (!noticeView.hidden || noticeView.classList.contains('visible')) {
          loadNoticeHistory(grade);
        }
        refreshSearchIfNeeded({ force: true });
      });
    });

    classGrid.addEventListener('click', (event) => {
      const chip = event.target.closest('.chip');
      if (chip) {
        openStatusSelector(Number(chip.dataset.grade), Number(chip.dataset.section), Number(chip.dataset.number));
        return;
      }

      const inlineStat = event.target.closest('.class-inline-stat');
      if (!inlineStat) return;
      const card = inlineStat.closest('.class-card');
      if (!card) return;
      const section = Number(card.dataset.section);
      card.dataset.view = inlineStat.dataset.view;
      renderClassCard(card, currentGrade, section, getSectionSnapshot(section));
    });

    setInterval(() => {
      if (connectedSocketCount > 0) return;
      scheduleGradeReload(currentGrade, 0);
    }, 60000);
    window.addEventListener('resize', syncNoticeDrawerMode);

    (function startHeartbeat() {
      const HEARTBEAT_MS = 3 * 60 * 60 * 1000;
      const ping = () => {
        fetch('/auth/status', { method: 'GET', credentials: 'include', cache: 'no-store', keepalive: true }).catch(() => {});
      };
      ping();
      setInterval(ping, HEARTBEAT_MS);
    })();

    initNoticeTargetSelector();
    createClassCards();
    ensureTeacherNameOnboarding();
    setActiveGrade(currentGrade);
    loadClassState(currentGrade);
    connectToGradeWebSockets(currentGrade);
    syncNoticeDrawerMode();
  </script>
</body>
</html>
